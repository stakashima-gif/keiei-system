<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>経営管理システム</title>
<style>
  :root{
    --bg:#0f1115; --panel:#171a21; --panel2:#1e222b; --line:#2a2f3a;
    --txt:#e7eaf0; --muted:#9aa3b2; --accent:#4f8cff; --accent2:#22c55e;
    --warn:#f59e0b; --danger:#ef4444; --info:#06b6d4; --purple:#a78bfa;
    --radius:12px; --shadow:0 4px 24px rgba(0,0,0,.35);
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic UI","Meiryo",sans-serif;background:var(--bg);color:var(--txt);font-size:14px;line-height:1.5}
  .app{display:flex;min-height:100vh}
  .sidebar{width:230px;background:var(--panel);border-right:1px solid var(--line);padding:18px 12px;position:sticky;top:0;height:100vh;overflow-y:auto;flex-shrink:0;display:flex;flex-direction:column}
  .brand{display:flex;align-items:center;gap:10px;padding:6px 8px 16px}
  .brand .logo{width:34px;height:34px;border-radius:9px;background:linear-gradient(135deg,var(--accent),var(--purple));display:grid;place-items:center;font-weight:800;color:#fff}
  .brand h1{font-size:15px;margin:0;font-weight:700}
  .brand small{color:var(--muted);font-size:11px}
  .nav{display:flex;flex-direction:column;gap:2px;margin-top:6px}
  .nav button{display:flex;align-items:center;gap:10px;width:100%;text-align:left;background:transparent;border:none;color:var(--muted);padding:10px 12px;border-radius:9px;cursor:pointer;font-size:13.5px;font-family:inherit}
  .nav button:hover{background:var(--panel2);color:var(--txt)}
  .nav button.active{background:linear-gradient(90deg,rgba(79,140,255,.18),transparent);color:var(--txt);font-weight:600}
  .nav .ic{width:18px;text-align:center;opacity:.85}
  .nav .sect{font-size:10.5px;color:#5c6675;text-transform:uppercase;letter-spacing:.08em;padding:14px 12px 4px;font-weight:700}
  .userbox{margin-top:auto;border-top:1px solid var(--line);padding-top:12px}
  .userbox .uname{font-size:13px;font-weight:600;padding:0 8px}
  .userbox .urole{font-size:11px;color:var(--muted);padding:2px 8px 8px}
  .main{flex:1;min-width:0;display:flex;flex-direction:column}
  .topbar{display:flex;align-items:center;justify-content:space-between;padding:16px 26px;border-bottom:1px solid var(--line);background:rgba(15,17,21,.6);position:sticky;top:0;z-index:20;backdrop-filter:blur(8px)}
  .topbar h2{margin:0;font-size:18px;white-space:nowrap}
  .topbar .sub{color:var(--muted);font-size:12px;margin-top:2px}
  .actions{display:flex;gap:8px;align-items:center}
  .content{padding:24px 26px;max-width:1400px;width:100%}
  .btn{background:var(--accent);color:#fff;border:none;padding:8px 14px;border-radius:9px;cursor:pointer;font-size:13px;font-weight:600;font-family:inherit;display:inline-flex;align-items:center;gap:6px}
  .btn:hover{filter:brightness(1.08)}
  .btn.ghost{background:var(--panel2);color:var(--txt);border:1px solid var(--line)}
  .btn.sm{padding:5px 10px;font-size:12px}
  .btn.danger{background:var(--danger)}
  .btn.block{width:100%;justify-content:center;padding:11px}
  .grid{display:grid;gap:16px}
  .kpis{grid-template-columns:repeat(auto-fit,minmax(190px,1fr))}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:18px}
  .kpi .label{color:var(--muted);font-size:12px;display:flex;align-items:center;gap:6px}
  .kpi .val{font-size:26px;font-weight:800;margin-top:8px;letter-spacing:-.02em}
  .kpi .delta{font-size:12px;margin-top:6px}
  .up{color:var(--accent2)} .down{color:var(--danger)}
  .card h3{margin:0 0 14px;font-size:14px;display:flex;align-items:center;justify-content:space-between}
  .pill{font-size:11px;padding:3px 9px;border-radius:20px;font-weight:600;display:inline-block}
  .pill.ok{background:rgba(34,197,94,.15);color:#4ade80}
  .pill.warn{background:rgba(245,158,11,.15);color:#fbbf24}
  .pill.bad{background:rgba(239,68,68,.15);color:#f87171}
  .pill.info{background:rgba(6,182,212,.15);color:#22d3ee}
  .pill.muted{background:var(--panel2);color:var(--muted)}
  table{width:100%;border-collapse:collapse;font-size:13px}
  th,td{text-align:left;padding:10px 12px;border-bottom:1px solid var(--line)}
  th{color:var(--muted);font-weight:600;font-size:11.5px;text-transform:uppercase;letter-spacing:.04em}
  tbody tr:hover{background:var(--panel2)}
  td.num,th.num{text-align:right;font-variant-numeric:tabular-nums}
  .row-actions{display:flex;gap:6px;justify-content:flex-end}
  .icon-btn{background:transparent;border:none;color:var(--muted);cursor:pointer;font-size:14px;padding:2px 6px;border-radius:6px}
  .icon-btn:hover{background:var(--panel2);color:var(--txt)}
  .modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.55);display:none;place-items:center;z-index:100;padding:20px}
  .modal-bg.show{display:grid}
  .modal{background:var(--panel);border:1px solid var(--line);border-radius:14px;max-width:540px;width:100%;box-shadow:var(--shadow);max-height:90vh;overflow-y:auto}
  .modal header{padding:18px 22px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center}
  .modal header h3{margin:0;font-size:16px}
  .modal .body{padding:22px}
  .modal footer{padding:16px 22px;border-top:1px solid var(--line);display:flex;justify-content:flex-end;gap:10px}
  .field{margin-bottom:14px}
  .field label{display:block;font-size:12px;color:var(--muted);margin-bottom:6px}
  .field input,.field select,.field textarea{width:100%;background:var(--bg);border:1px solid var(--line);color:var(--txt);padding:9px 11px;border-radius:8px;font-size:13px;font-family:inherit}
  .field input:focus,.field select:focus{outline:none;border-color:var(--accent)}
  .field.two{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .field.two label{grid-column:1/-1}
  .checks{display:grid;grid-template-columns:1fr 1fr;gap:8px}
  .checks label{display:flex;align-items:center;gap:8px;background:var(--bg);border:1px solid var(--line);padding:8px 10px;border-radius:8px;font-size:12.5px;color:var(--txt);cursor:pointer}
  .checks input{width:auto}
  .bars{display:flex;align-items:flex-end;gap:8px;height:180px;padding-top:10px}
  .bars .bar{flex:1;display:flex;flex-direction:column;justify-content:flex-end;align-items:center;gap:6px;height:100%}
  .bars .bar .b{width:70%;border-radius:6px 6px 0 0;background:linear-gradient(180deg,var(--accent),rgba(79,140,255,.4));min-height:2px}
  .bars .bar .b.b2{background:linear-gradient(180deg,var(--accent2),rgba(34,197,94,.4))}
  .bars .bar small{color:var(--muted);font-size:10.5px}
  .legend{display:flex;gap:16px;font-size:11.5px;color:var(--muted);margin-top:10px}
  .legend i{display:inline-block;width:10px;height:10px;border-radius:3px;margin-right:5px;vertical-align:middle}
  .progress{height:8px;background:var(--panel2);border-radius:20px;overflow:hidden}
  .progress > i{display:block;height:100%;border-radius:20px;background:var(--accent)}
  .two-col{display:grid;grid-template-columns:1.4fr 1fr;gap:16px}
  .three-col{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
  .donut{display:grid;place-items:center}
  .alert{padding:12px 14px;border-radius:9px;font-size:13px;margin-bottom:10px;border:1px solid}
  .alert.warn{background:rgba(245,158,11,.08);border-color:rgba(245,158,11,.3);color:#fbbf24}
  .alert.bad{background:rgba(239,68,68,.08);border-color:rgba(239,68,68,.3);color:#f87171}
  .alert.ok{background:rgba(34,197,94,.08);border-color:rgba(34,197,94,.3);color:#4ade80}
  .alert.info{background:rgba(6,182,212,.08);border-color:rgba(6,182,212,.3);color:#22d3ee}
  .stat-line{display:flex;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--line);font-size:13px}
  .stat-line:last-child{border-bottom:none}
  .stat-line b{font-variant-numeric:tabular-nums}
  .muted{color:var(--muted)}
  .empty{text-align:center;color:var(--muted);padding:40px}
  .toolbar{display:flex;gap:10px;align-items:center;margin-bottom:16px;flex-wrap:wrap}
  .toolbar select,.toolbar input{background:var(--panel);border:1px solid var(--line);color:var(--txt);padding:7px 11px;border-radius:8px;font-size:13px;font-family:inherit}
  .chip{background:var(--panel2);border:1px solid var(--line);color:var(--muted);padding:6px 12px;border-radius:20px;font-size:12.5px;font-weight:600;cursor:pointer;font-family:inherit}
  .chip:hover{color:var(--txt)}
  .chip.active{background:rgba(79,140,255,.18);color:#8fb4ff;border-color:rgba(79,140,255,.5)}
  .scorebar{width:52px;height:6px;border-radius:4px;background:var(--panel2);overflow:hidden;display:inline-block;vertical-align:middle}
  .scorebar>i{display:block;height:100%;border-radius:4px}
  .slider-row{display:grid;grid-template-columns:118px 1fr 22px;gap:10px;align-items:center;margin-bottom:9px}
  .slider-row label{margin:0;font-size:12.5px;color:var(--txt)}
  .slider-row input[type=range]{width:100%}
  .slider-row b{text-align:right;font-variant-numeric:tabular-nums}
  /* ログイン画面 */
  .login-wrap{min-height:100vh;display:grid;place-items:center;padding:20px}
  .login-card{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:34px;width:100%;max-width:380px;box-shadow:var(--shadow)}
  .login-card .logo{width:48px;height:48px;border-radius:12px;background:linear-gradient(135deg,var(--accent),var(--purple));display:grid;place-items:center;font-weight:800;color:#fff;font-size:20px;margin:0 auto 16px}
  .login-card h1{text-align:center;font-size:19px;margin:0 0 4px}
  .login-card p{text-align:center;color:var(--muted);font-size:12px;margin:0 0 22px}
  .login-err{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);color:#f87171;padding:10px;border-radius:8px;font-size:12.5px;margin-bottom:14px;text-align:center}
  @media(max-width:760px){
    .app{flex-direction:column}
    .sidebar{width:100%;height:auto;position:static;border-right:none;border-bottom:1px solid var(--line);padding:12px}
    .nav{flex-direction:row;flex-wrap:wrap;gap:4px}
    .nav .sect{display:none}
    .nav button{width:auto;padding:7px 10px;font-size:12.5px}
    .userbox{margin-top:12px}
    .topbar{flex-direction:column;align-items:flex-start;gap:10px;padding:14px 16px}
    .topbar h2{white-space:normal;font-size:16px}
    .actions{flex-wrap:wrap}
    .content{padding:16px}
    .two-col,.three-col{grid-template-columns:1fr}
    .checks{grid-template-columns:1fr}
    table{font-size:12px}th,td{padding:8px 8px}
  }
</style>
</head>
<body>
<div id="root"></div>

<div class="modal-bg" id="modal-bg">
  <div class="modal">
    <header><h3 id="modal-title">編集</h3><button class="icon-btn" onclick="closeModal()">✕</button></header>
    <div class="body" id="modal-body"></div>
    <footer>
      <button class="btn ghost" onclick="closeModal()">キャンセル</button>
      <button class="btn" id="modal-save">保存</button>
    </footer>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script>
//==================================================================
// API クライアント
//==================================================================
async function api(method, path, body){
  const opt={method, headers:{}, credentials:'same-origin'};
  if(body!==undefined){ opt.headers['Content-Type']='application/json'; opt.body=JSON.stringify(body); }
  const res=await fetch(path, opt);
  let data=null; try{ data=await res.json(); }catch(e){}
  if(!res.ok){ const e=new Error((data&&data.error)||('エラー '+res.status)); e.status=res.status; throw e; }
  return data;
}

//==================================================================
// 共通フォーマッタ・定義
//==================================================================
const yen = n => '¥' + Math.round(n||0).toLocaleString('ja-JP');
const pct = n => (n>=0?'+':'') + (n||0).toFixed(1) + '%';
const todayISO = () => new Date().toISOString().slice(0,10);
const months = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
const sum = (arr,f)=>(arr||[]).reduce((a,x)=>a+(f?f(x):x),0);
function b(){ return 'id'+Math.random().toString(36).slice(2,9); }
function addDays(n){ const d=new Date(); d.setDate(d.getDate()+n); return d.toISOString().slice(0,10); }
function fmtDate(iso){ if(!iso) return '—'; const d=new Date(iso); return `${d.getMonth()+1}/${d.getDate()}`; }
function daysTo(iso){ return Math.ceil((new Date(iso)-new Date(todayISO()))/86400000); }

const PAGES = [
  {id:'dashboard', icon:'📊', name:'ダッシュボード', title:'経営ダッシュボード', sub:'全社の経営状況をひと目で把握', sect:'分析'},
  {id:'analysis', icon:'📈', name:'経営状況分析', title:'経営状況分析', sub:'指標・トレンド・健全性の診断', sect:'分析'},
  {id:'breakeven', icon:'⚖️', name:'損益分岐分析', title:'損益分岐点分析', sub:'固定費・変動費から採算ラインを算出', sect:'分析'},
  {id:'business', icon:'🏢', name:'事業管理', title:'事業管理', sub:'事業セグメント別の進捗と採算', sect:'事業・収益'},
  {id:'sales', icon:'💹', name:'売上管理', title:'売上管理', sub:'月次・事業別の売上推移', sect:'事業・収益'},
  {id:'finance', icon:'💰', name:'財務管理', title:'財務管理', sub:'損益計算書（PL）と資金状況', sect:'事業・収益'},
  {id:'cashflow', icon:'🏦', name:'資金繰り', title:'資金繰り表', sub:'手入力・CSV取込・銀行API連携の入出金から自動集計', sect:'事業・収益'},
  {id:'tasks', icon:'✅', name:'タスク管理', title:'タスク管理', sub:'全社のタスク進捗と期限管理', sect:'業務'},
  {id:'contracts', icon:'📄', name:'契約管理', title:'契約管理', sub:'契約状況と更新期限のアラート', sect:'業務'},
  {id:'people', icon:'👥', name:'人材管理', title:'人材状況', sub:'人員構成・人件費・評価', sect:'業務'},
  {id:'recruits', icon:'🧑‍💼', name:'採用管理', title:'採用管理', sub:'求職者管理・5項目スコア評価・Airワーク連携', sect:'業務'},
  {id:'memos', icon:'📝', name:'打ち合わせメモ', title:'打ち合わせメモ', sub:'商談・打ち合わせの記録。クライアント名で検索できます', sect:'業務'},
  {id:'tools', icon:'🔗', name:'ツール', title:'ツール一元管理', sub:'よく使うツールへのリンク集', sect:'ツール'},
];
const PAGE_WRITE={business:['businesses'],sales:['sales'],finance:['finance'],breakeven:['cost'],tasks:['tasks'],contracts:['contracts'],people:['people'],tools:['tools'],recruits:['recruits'],cashflow:['cashflow'],memos:['memos'],dashboard:[],analysis:[]};
const PAGE_NAME=Object.fromEntries(PAGES.map(p=>[p.id,p.name]));

//==================================================================
// 状態
//==================================================================
let ME=null, STORE={}, REV=0, current=null, pollTimer=null;
function canEdit(pageId){
  if(!ME) return false;
  if(ME.role==='admin') return true;
  if(ME.role!=='editor') return false;
  return (ME.pages||[]).includes(pageId) && (PAGE_WRITE[pageId]||[]).length>0;
}
function allowedPages(){ return ME.role==='admin'?PAGES.map(p=>p.id):(ME.pages||[]); }

//==================================================================
// 起動・認証フロー
//==================================================================
async function boot(){
  try{ const r=await api('GET','/api/me'); ME=r.user; await afterLogin(); }
  catch(e){ renderLogin(); }
}
async function afterLogin(){
  await loadStore();
  const pages=allowedPages();
  current = pages.includes('dashboard')?'dashboard':(pages[0]|| (ME.role==='admin'?'users':null));
  renderShell(); render();
  startPolling();
}
async function loadStore(){ const r=await api('GET','/api/store'); STORE=r.store; REV=r.rev; }

function renderLogin(msg){
  stopPolling();
  document.getElementById('root').innerHTML=`
    <div class="login-wrap"><div class="login-card">
      <div class="logo">経</div>
      <h1>経営管理システム</h1><p>ログインしてください</p>
      <div id="login-err" class="login-err" style="display:${msg?'block':'none'}">${msg||''}</div>
      <div class="field"><label>ユーザーID</label><input id="li_user" autocomplete="username"></div>
      <div class="field"><label>パスワード</label><input id="li_pw" type="password" autocomplete="current-password"></div>
      <button class="btn block" id="li_btn">ログイン</button>
    </div></div>`;
  const submit=async()=>{
    try{ const r=await api('POST','/api/login',{username:document.getElementById('li_user').value,password:document.getElementById('li_pw').value});
      ME=r.user; await afterLogin();
    }catch(e){ const el=document.getElementById('login-err'); el.style.display='block'; el.textContent=e.message; }
  };
  document.getElementById('li_btn').onclick=submit;
  document.getElementById('li_pw').addEventListener('keydown',e=>{if(e.key==='Enter')submit();});
  document.getElementById('li_user').focus();
}
async function logout(){ try{await api('POST','/api/logout');}catch(e){} ME=null; STORE={}; renderLogin(); }

//==================================================================
// アプリのシェル（サイドバー）
//==================================================================
function renderShell(){
  const pages=allowedPages();
  const sects={}; PAGES.forEach(p=>{ if(pages.includes(p.id)){ (sects[p.sect]=sects[p.sect]||[]).push(p); }});
  let navHtml='';
  Object.entries(sects).forEach(([s,ps])=>{
    navHtml+=`<div class="sect">${s}</div>`;
    ps.forEach(p=>navHtml+=`<button data-pg="${p.id}"><span class="ic">${p.icon}</span> ${p.name}</button>`);
  });
  if(ME.role==='admin'){
    navHtml+=`<div class="sect">管理</div><button data-pg="users"><span class="ic">🔑</span> アカウント管理</button>`;
  }
  document.getElementById('root').innerHTML=`
    <div class="app">
      <aside class="sidebar">
        <div class="brand"><div class="logo">経</div><div><h1>経営管理システム</h1><small>Management Suite</small></div></div>
        <nav class="nav" id="nav">${navHtml}</nav>
        <div class="userbox">
          <div class="uname">${ME.display_name}</div>
          <div class="urole">${roleLabel(ME.role)}</div>
          <button class="btn ghost sm" style="width:100%;justify-content:center;margin-bottom:6px" onclick="changePassword()">🔒 パスワード変更</button>
          <button class="btn ghost sm" style="width:100%;justify-content:center" onclick="logout()">↩ ログアウト</button>
        </div>
      </aside>
      <main class="main">
        <div class="topbar"><div><h2 id="page-title"></h2><div class="sub" id="page-sub"></div></div><div class="actions" id="page-actions"></div></div>
        <div class="content" id="content"></div>
      </main>
    </div>`;
  document.querySelectorAll('#nav button').forEach(btn=>btn.onclick=()=>go(btn.dataset.pg));
}
function roleLabel(r){ return r==='admin'?'管理者（全権限）':r==='editor'?'編集者':'閲覧者'; }
function go(id){ current=id; markNav(); render(); window.scrollTo(0,0); }
function markNav(){ document.querySelectorAll('#nav button').forEach(b=>b.classList.toggle('active', b.dataset.pg===current)); }
function setHeader(title,sub,actions){
  document.getElementById('page-title').textContent=title;
  document.getElementById('page-sub').textContent=sub||'';
  document.getElementById('page-actions').innerHTML=actions||'';
}

//==================================================================
// リアルタイム反映（ポーリング）
//==================================================================
function startPolling(){
  stopPolling();
  pollTimer=setInterval(async()=>{
    if(!ME) return;
    if(document.getElementById('modal-bg').classList.contains('show')) return; // 編集中は更新しない
    try{ const r=await api('GET','/api/rev');
      if(r.rev!==REV){ await loadStore(); if(current!=='users') render(); }
    }catch(e){ if(e.status===401){ ME=null; renderLogin('セッションが切れました。再度ログインしてください。'); } }
  }, 4000);
}
function stopPolling(){ if(pollTimer){ clearInterval(pollTimer); pollTimer=null; } }

//==================================================================
// データ書き込み（API経由）
//==================================================================
async function persist(coll){
  const r=await api('PUT','/api/store/'+coll,{value:STORE[coll]});
  REV=r.rev;
}

//==================================================================
// チャート
//==================================================================
function barChart(data, opts={}){
  const max=Math.max(...data.map(d=>d.v),1); const cls=opts.green?'b b2':'b';
  return `<div class="bars">${data.map(d=>`<div class="bar" title="${d.label}: ${opts.fmt?opts.fmt(d.v):d.v}"><div class="${cls}" style="height:${Math.max(d.v/max*100,1)}%"></div><small>${d.label}</small></div>`).join('')}</div>`;
}
// 事業（売上の列）は登録済みの事業から動的に生成。事業ID をキーにする
const PALETTE=['#4f8cff','#22c55e','#a78bfa','#f59e0b','#06b6d4','#ef4444','#ec4899','#14b8a6'];
function salesCols(){ return (STORE.businesses||[]).map((bz,i)=>({key:bz.id,label:bz.name,color:PALETTE[i%PALETTE.length]})); }
function stackedSales(){ return salesBars(STORE.sales||[], salesCols()); }
function donut(segments, size=140){
  const total=sum(segments,s=>s.value)||1; let acc=0; const r=size/2-12, c=size/2, circ=2*Math.PI*r;
  const arcs=segments.map(s=>{const frac=s.value/total; const dash=frac*circ; const off=-acc*circ; acc+=frac;
    return `<circle cx="${c}" cy="${c}" r="${r}" fill="none" stroke="${s.color}" stroke-width="18" stroke-dasharray="${dash} ${circ-dash}" stroke-dashoffset="${off}" transform="rotate(-90 ${c} ${c})"/>`;}).join('');
  return `<div class="donut"><svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">${arcs}
    <text x="${c}" y="${c-2}" text-anchor="middle" fill="#e7eaf0" font-size="13" font-weight="700">${total>=1e6?(total/1e6).toFixed(0)+'M':total}</text>
    <text x="${c}" y="${c+16}" text-anchor="middle" fill="#9aa3b2" font-size="10">合計</text></svg></div>`;
}
function legendList(segments){
  const total=sum(segments,s=>s.value)||1;
  return `<div style="margin-top:8px">${segments.map(s=>`<div class="stat-line"><span><i style="display:inline-block;width:10px;height:10px;border-radius:3px;background:${s.color};margin-right:8px"></i>${s.label}</span><b>${yen(s.value)} <span class="muted" style="font-weight:400">(${(s.value/total*100).toFixed(0)}%)</span></b></div>`).join('')}</div>`;
}
function kpi(label,icon,val,delta){ return `<div class="card kpi"><div class="label">${icon} ${label}</div><div class="val">${val}</div><div class="delta">${delta||''}</div></div>`; }
function prioDot(p){ const c=p==='高'?'#ef4444':p==='中'?'#f59e0b':'#22c55e'; return `<span style="color:${c}">●</span>`; }
function legendStat(k,v){ return `<div class="stat-line"><span class="muted">${k}</span><b>${v}</b></div>`; }

//==================================================================
// 集計
//==================================================================
// 売上は「売上管理(事業別売上)」を正データとする。財務(PL)の売上もここに連動する
// 月次売上の合計は「現在登録されている各事業の列」から常に計算する（保存済みtotalは使わない＝事業を作り直しても食い違わない）
function rowTotal(row){ return salesCols().reduce((a,c)=>a+((row&&row[c.key])||0),0); }
function salesTotal(i){ return rowTotal((STORE.sales||[])[i]); }
function monthOp(i){ const x=(STORE.finance||[])[i]||{}; return salesTotal(i)-(x.cogs||0)-(x.sga||0); }
function ytd(){ const f=STORE.finance||[]; const rev=sum(STORE.sales,x=>rowTotal(x)); const cogs=sum(f,x=>x.cogs),sga=sum(f,x=>x.sga); const op=rev-cogs-sga;
  return {rev,op,cogs,sga,opRate:rev?op/rev*100:0,gpRate:rev?(rev-cogs)/rev*100:0}; }
function laborTotal(){ return sum(STORE.people,p=>p.cost)*12; }
function breakeven(){ const {fixedMonthly,variableRate}=STORE.cost||{fixedMonthly:0,variableRate:0}; const cmRate=1-variableRate;
  const beRevenue=cmRate>0?fixedMonthly/cmRate:0; return {fixedMonthly,variableRate,cmRate,beRevenue,beAnnual:beRevenue*12}; }

function renderAnalysis(c,p){
  setHeader(p.title,p.sub,'');
  const y=ytd(); const f=STORE.finance||[]; const be=breakeven(); const labor=laborTotal();
  const opSeries=f.map((x,i)=>({label:(i+1)+'月',v:Math.max(monthOp(i),0)}));
  const gp=y.rev-y.cogs;
  const checks=[
    {k:'営業利益率',good:y.opRate>=10,target:'10%以上',cur:y.opRate.toFixed(1)+'%'},
    {k:'粗利率',good:y.gpRate>=50,target:'50%以上',cur:y.gpRate.toFixed(1)+'%'},
    {k:'労働分配率',good:gp?(labor/gp*100)<=60:false,target:'60%以下',cur:gp?(labor/gp*100).toFixed(0)+'%':'—'},
    {k:'損益分岐比率',good:y.rev?(be.beAnnual/y.rev*100)<=85:false,target:'85%以下',cur:y.rev?(be.beAnnual/y.rev*100).toFixed(0)+'%':'—'},
  ];
  const score=Math.round(checks.filter(x=>x.good).length/checks.length*100);
  const nPeople=(STORE.people||[]).length||1;
  c.innerHTML=`
    <div class="grid kpis">
      ${kpi('経営健全性スコア','🩺',score+' / 100',`<span class="${score>=75?'up':score>=50?'':'down'}">${score>=75?'良好':score>=50?'要注意':'危険'}</span>`)}
      ${kpi('営業利益率','📊',y.opRate.toFixed(1)+'%',`<span class="muted">業界目安 10%</span>`)}
      ${kpi('労働分配率','👥',gp?(labor/gp*100).toFixed(0)+'%':'—',`<span class="muted">粗利に占める人件費</span>`)}
      ${kpi('損益分岐比率','⚖️',y.rev?(be.beAnnual/y.rev*100).toFixed(0)+'%':'—',`<span class="muted">低いほど安全</span>`)}
    </div><div style="height:16px"></div>
    <div class="two-col">
      <div class="card"><h3>営業利益の推移</h3>${barChart(opSeries,{green:true,fmt:yen})}</div>
      <div class="card"><h3>健全性チェック</h3>
        ${checks.map(ch=>`<div class="stat-line"><span>${ch.good?'✅':'⚠️'} ${ch.k} <span class="muted" style="font-size:11px">(目標 ${ch.target})</span></span><b class="${ch.good?'up':'down'}">${ch.cur}</b></div>`).join('')}
        <div class="alert ${score>=75?'ok':score>=50?'warn':'bad'}" style="margin-top:14px">${score>=75?'全体として健全な経営状態です。利益率の維持に注力しましょう。':score>=50?'いくつかの指標で改善余地があります。コスト構造を見直しましょう。':'複数の指標が警戒水準です。固定費削減と粗利改善が急務です。'}</div>
      </div></div>
    <div style="height:16px"></div>
    <div class="card"><h3>主要財務指標（年初来）</h3><div class="three-col">
      <div>${legendStat('売上高',yen(y.rev))}${legendStat('売上原価',yen(y.cogs))}${legendStat('売上総利益',yen(gp))}</div>
      <div>${legendStat('販管費',yen(y.sga))}${legendStat('営業利益',yen(y.op))}${legendStat('営業利益率',y.opRate.toFixed(1)+'%')}</div>
      <div>${legendStat('年間人件費',yen(labor))}${legendStat('1人当たり売上',yen(y.rev/nPeople))}${legendStat('1人当たり利益',yen(y.op/nPeople))}</div>
    </div></div>`;
}

// ---- 損益分岐 ----
function renderBreakeven(c,p){
  const editable=canEdit('breakeven');
  setHeader(p.title,p.sub, editable?`<button class="btn ghost" onclick="editCost()">⚙ 前提条件を編集</button>`:'');
  const be=breakeven(); const s=STORE.sales||[]; const curRev=salesTotal(s.length-1);
  const rows=[]; for(let m=0.6;m<=1.601;m+=0.2){ const rev=be.beRevenue*m; const vc=rev*be.variableRate; rows.push({rev,vc,fc:be.fixedMonthly,profit:rev-vc-be.fixedMonthly}); }
  c.innerHTML=`
    <div class="grid kpis">
      ${kpi('損益分岐売上(月次)','⚖️',yen(be.beRevenue),`<span class="muted">これを超えれば黒字</span>`)}
      ${kpi('損益分岐売上(年間)','📅',yen(be.beAnnual),'')}
      ${kpi('限界利益率','📈',(be.cmRate*100).toFixed(0)+'%',`<span class="muted">変動費率 ${(be.variableRate*100).toFixed(0)}%</span>`)}
      ${kpi('安全余裕率','🛡️',curRev?((curRev-be.beRevenue)/curRev*100).toFixed(0)+'%':'—',`<span class="${curRev>=be.beRevenue?'up':'down'}">当月売上ベース</span>`)}
    </div><div style="height:16px"></div>
    <div class="two-col">
      <div class="card"><h3>前提条件</h3>
        <div class="stat-line"><span>月次固定費（人件費・家賃等）</span><b>${yen(be.fixedMonthly)}</b></div>
        <div class="stat-line"><span>変動費率（売上に対する原価）</span><b>${(be.variableRate*100).toFixed(0)}%</b></div>
        <div class="stat-line"><span>限界利益率</span><b>${(be.cmRate*100).toFixed(0)}%</b></div>
        <div class="stat-line"><span>当月売上</span><b>${yen(curRev)}</b></div>
        <div class="stat-line"><span>当月の損益</span><b class="${curRev>=be.beRevenue?'up':'down'}">${yen(curRev-curRev*be.variableRate-be.fixedMonthly)}</b></div>
        <div class="alert ${curRev>=be.beRevenue?'ok':'bad'}" style="margin-top:12px">${curRev>=be.beRevenue?`✅ 損益分岐点を ${yen(curRev-be.beRevenue)} 上回っています`:`⚠️ 黒字化まであと ${yen(be.beRevenue-curRev)} の売上が必要です`}</div>
      </div>
      <div class="card"><h3>売上シミュレーション</h3>
        <table><thead><tr><th class="num">月次売上</th><th class="num">変動費</th><th class="num">固定費</th><th class="num">損益</th></tr></thead>
        <tbody>${rows.map(r=>`<tr><td class="num">${yen(r.rev)}</td><td class="num">${yen(r.vc)}</td><td class="num">${yen(r.fc)}</td><td class="num ${r.profit>=0?'up':'down'}"><b>${yen(r.profit)}</b></td></tr>`).join('')}</tbody></table>
        <p class="muted" style="font-size:12px;margin:12px 0 0">※ 損益分岐点 = 固定費 ÷ 限界利益率</p>
      </div></div>`;
}

// ---- 売上管理（所属事業スコープ対応・事業に動的連動） ----
function presentSalesCols(s){
  // データの行に存在する事業列だけを抽出（事業スコープ時は所属事業1列のみ）
  return salesCols().filter(col=>s.some(x=>(col.key in x)));
}
function renderSales(c,p){
  const ed=canEdit('sales');
  const s=STORE.sales||[];
  const scoped = s.length && s[0]._scoped;  // 事業スコープ中なら事業名
  let cols=presentSalesCols(s); if(!cols.length) cols=salesCols();
  const total=sum(s,x=>rowTotal(x));
  const maxMonth=s.length?months[s.indexOf(s.reduce((a,bb)=>rowTotal(bb)>rowTotal(a)?bb:a))]:'—';
  setHeader(scoped?`売上管理（${scoped}）`:p.title, scoped?`${scoped}の売上推移`:p.sub,
    (ed && !scoped)?`<button class="btn ghost" onclick="editSales()">✏ 月次データを編集</button>`:(scoped?`<span class="pill info">自事業のみ表示</span>`:roBadge()));
  // 構成比チャート用セグメント
  const seg=cols.map(col=>({label:col.label,value:sum(s,x=>x[col.key]||0),color:col.color}));
  c.innerHTML=`
    <div class="grid kpis">
      ${kpi('年間売上合計','💹',yen(total),'')}${kpi('月平均','📅',yen(total/12),'')}
      ${kpi('最高月','⬆️',yen(Math.max(...s.map(x=>rowTotal(x)),0)),`<span class="muted">${maxMonth}</span>`)}
      ${cols.length>1?kpi('主力比率','📊',total?(Math.max(...seg.map(g=>g.value))/total*100).toFixed(0)+'%':'0%',`<span class="muted">最大事業</span>`):kpi('対象事業','🏢',scoped||cols[0].label,'')}
    </div><div style="height:16px"></div>
    <div class="card"><h3>月次売上推移${cols.length>1?'（事業別）':''}</h3>${salesBars(s,cols)}</div><div style="height:16px"></div>
    <div class="card"><h3>月次明細</h3><table>
    <thead><tr><th>月</th>${cols.map(col=>`<th class="num">${col.label}</th>`).join('')}${cols.length>1?'<th class="num">合計</th>':''}</tr></thead>
    <tbody>${s.map((x,i)=>`<tr><td>${months[i]}</td>${cols.map(col=>`<td class="num">${yen(x[col.key]||0)}</td>`).join('')}${cols.length>1?`<td class="num"><b>${yen(cols.reduce((a,col)=>a+(x[col.key]||0),0))}</b></td>`:''}</tr>`).join('')}
    <tr style="border-top:2px solid var(--line)"><td><b>合計</b></td>${cols.map(col=>`<td class="num"><b>${yen(sum(s,x=>x[col.key]||0))}</b></td>`).join('')}${cols.length>1?`<td class="num"><b>${yen(total)}</b></td>`:''}</tr>
    </tbody></table></div>`;
}
function salesBars(s,cols){
  const rt=x=>cols.reduce((a,c)=>a+(x[c.key]||0),0);
  const max=Math.max(...s.map(rt),1);
  return `<div class="bars">${s.map((x,i)=>{const t=rt(x);return `<div class="bar" title="${months[i]} 計 ${yen(t)}">
    <div style="width:70%;height:${t/max*100}%;display:flex;flex-direction:column;justify-content:flex-end;border-radius:6px 6px 0 0;overflow:hidden">
      ${cols.slice().reverse().map(col=>`<div style="background:${col.color};height:${t?(x[col.key]||0)/t*100:0}%"></div>`).join('')}
    </div><small>${i+1}月</small></div>`;}).join('')}</div>
    <div class="legend">${cols.map(col=>`<span><i style="background:${col.color}"></i>${col.label}</span>`).join('')}</div>`;
}

// 残高推移の折れ線（SVG・自前）
function lineChart(points){
  const w=Math.max(points.length*92,320), h=190, pad=30;
  const vs=points.map(p=>p.v), min=Math.min(...vs,0), max=Math.max(...vs,1), span=(max-min)||1;
  const X=i=>pad+i*((w-pad*2)/Math.max(points.length-1,1));
  const Y=v=>h-pad-((v-min)/span)*(h-pad*2);
  const line=points.map((p,i)=>`${i?'L':'M'}${X(i).toFixed(1)},${Y(p.v).toFixed(1)}`).join(' ');
  const area=`${line} L${X(points.length-1).toFixed(1)},${(h-pad).toFixed(1)} L${X(0).toFixed(1)},${(h-pad).toFixed(1)} Z`;
  const dots=points.map((p,i)=>`<circle cx="${X(i).toFixed(1)}" cy="${Y(p.v).toFixed(1)}" r="3.5" fill="#4f8cff"><title>${p.label}: ${yen(p.v)}</title></circle>`).join('');
  const labels=points.map((p,i)=>`<text x="${X(i).toFixed(1)}" y="${h-8}" text-anchor="middle" fill="#9aa3b2" font-size="10">${p.label}</text>`).join('');
  const zero=(min<0&&max>0)?`<line x1="${pad}" y1="${Y(0).toFixed(1)}" x2="${w-pad}" y2="${Y(0).toFixed(1)}" stroke="#3a4152" stroke-dasharray="3 3"/>`:'';
  return `<div style="overflow-x:auto"><svg width="${w}" height="${h}" viewBox="0 0 ${w} ${h}">
    <path d="${area}" fill="rgba(79,140,255,.12)"/>${zero}
    <path d="${line}" fill="none" stroke="#4f8cff" stroke-width="2"/>${dots}${labels}</svg></div>`;
}

//---- CSV取込（各銀行の明細CSV／Shift_JIS対応・列マッピング・プレビュー） ----
function cfCsvParse(text){
  const rows=[]; let cur=[],val='',q=false;
  for(let i=0;i<text.length;i++){ const ch=text[i];
    if(q){ if(ch==='"'){ if(text[i+1]==='"'){val+='"';i++;} else q=false; } else val+=ch; }
    else if(ch==='"') q=true;
    else if(ch===','){ cur.push(val); val=''; }
    else if(ch==='\n'){ cur.push(val); rows.push(cur); cur=[]; val=''; }
    else if(ch!=='\r') val+=ch;
  }
  if(val!==''||cur.length){ cur.push(val); rows.push(cur); }
  return rows.filter(r=>r.some(c=>String(c).trim()!==''));
}
function cfNormDate(s){
  s=String(s||'').trim();
  let m=s.match(/(\d{4})[\/\-年.](\d{1,2})[\/\-月.](\d{1,2})/);
  if(m) return `${m[1]}-${String(m[2]).padStart(2,'0')}-${String(m[3]).padStart(2,'0')}`;
  m=s.match(/^(\d{4})(\d{2})(\d{2})$/); if(m) return `${m[1]}-${m[2]}-${m[3]}`;
  return '';
}
function cfNum(s){ const v=String(s||'').replace(/[^\d]/g,''); return v?parseInt(v,10):0; }
async function cfReadFile(file){
  const buf=await file.arrayBuffer();
  let text=new TextDecoder('utf-8',{fatal:false}).decode(buf);
  if(/�/.test(text)){ try{ text=new TextDecoder('shift_jis').decode(buf); }catch(e){} } // 日本の銀行CSVはShift_JISが多い
  return text;
}

  }catch(e){ el.innerHTML=`<div class="alert bad">CSVの読み込みに失敗しました: ${escapeHtml(e.message)}</div>`; }
}
function cfCsvPreview(){
  const rows=window._cfRows||[]; const pv=document.getElementById('imp_prev'); if(!rows.length||!pv) return;
  const head=rows[0].map(h=>String(h).trim());
  const ix=id=>{ const v=fv(id); return v==='（なし）'?-1:head.indexOf(v); };
  const di=ix('m_date'), ri=ix('m_rem'), ii=ix('m_in'), oi=ix('m_out');
  const fixed=fv('imp_fixdate');
  const out=[];
  for(let r=1;r<rows.length;r++){
    const row=rows[r];
    const inAmt=ii>=0?cfNum(row[ii]):0, outAmt=oi>=0?cfNum(row[oi]):0;
    if(!inAmt && !outAmt) continue;
    const date=fixed||(di>=0?cfNormDate(row[di]):'');
    out.push({date, remarks:(ri>=0?String(row[ri]||'').trim():''),
      direction:inAmt?'in':'out', amount:inAmt||outAmt});
  }
  window._cfPreview=out;
  const noDate=out.filter(o=>!o.date).length;
  pv.innerHTML=`
    <div class="alert ${out.length?(noDate?'warn':'ok'):'bad'}" style="margin-top:6px">
      ${out.length?`${out.length}件を取り込めます。`:'取り込める明細がありません（入金列／出金列の指定を確認してください）。'}
      ${noDate?`<br>⚠ ${noDate}件で日付が読み取れません。「日付を一括指定」で日付を入れるか、取込後に各明細を編集してください。`:''}
    </div>
    ${out.length?`<div style="max-height:180px;overflow:auto;border:1px solid var(--line);border-radius:8px">
      <table><thead><tr><th>入出金日</th><th>摘要</th><th class="num">金額</th></tr></thead><tbody>
      ${out.slice(0,30).map(o=>`<tr><td class="${o.date?'':'down'}">${o.date||'未設定'}</td><td>${escapeHtml(o.remarks)}</td>
        <td class="num ${o.direction==='in'?'up':'down'}">${o.direction==='in'?'＋':'−'}${yen(o.amount)}</td></tr>`).join('')}
      </tbody></table>${out.length>30?`<div class="muted" style="padding:6px;font-size:12px">…ほか${out.length-30}件</div>`:''}</div>`:''}`;
}
async function cfDoImport(){
  const list=window._cfPreview||[];
  if(!list.length) throw new Error('取り込む明細がありません。CSVを選び、入金／出金の列を指定してください。');
  const bank=((STORE.banks||[]).find(b2=>b2.name===fv('imp_bank'))||{}).id||'';
  await loadStore();  // 最新を取得してから追記（他の人の入力を消さない）
  const add=list.map(o=>({id:b(),date:o.date,direction:o.direction,amount:o.amount,
    category:'',bank,remarks:o.remarks,source:'csv'}));
  STORE.cftxns=[...(STORE.cftxns||[]),...add];
  await persist('cftxns');
  window._cfRows=null; window._cfPreview=null;
  closeModal(); render();
  alert(`${add.length}件を取り込みました。資金繰り表に反映されています。`);
}

let modalSave=null;
function openModal(title, html, onSave){
  document.getElementById('modal-title').textContent=title;
  document.getElementById('modal-body').innerHTML=html;
  const sv=document.getElementById('modal-save'); sv.textContent='保存'; sv.style.display=''; // 毎回リセット
  modalSave=onSave;
  document.getElementById('modal-bg').classList.add('show');
}
function closeModal(){ document.getElementById('modal-bg').classList.remove('show'); modalSave=null; }
document.getElementById('modal-save').onclick=async()=>{ if(modalSave){ try{ await modalSave(); }catch(e){ alert(e.message); } } };
document.getElementById('modal-bg').onclick=e=>{ if(e.target.id==='modal-bg') closeModal(); };
function fv(id){ return document.getElementById(id).value; }
function fnum(id){ return Number(document.getElementById(id).value)||0; }
function field(label,id,val,type='text'){ return `<div class="field"><label>${label}</label><input id="${id}" type="${type}" value="${val??''}"></div>`; }
function selField(label,id,val,opts){ return `<div class="field"><label>${label}</label><select id="${id}">${opts.map(o=>`<option${o===val?' selected':''}>${o}</option>`).join('')}</select></div>`; }

async function upsert(coll,obj,id){
  // サーバーに「1件だけ」送る（他の項目・他タブのデータを上書きしない）
  const r=await api('POST','/api/store/'+coll+'/item',{value:obj}); REV=r.rev;
  STORE[coll]=STORE[coll]||[];
  const i=STORE[coll].findIndex(x=>x.id===obj.id);
  if(i>=0) STORE[coll][i]=obj; else STORE[coll].push(obj);
  closeModal(); render();
}
async function del(coll,id){
  if(!confirm('削除しますか?')) return;
  try{ const r=await api('DELETE','/api/store/'+coll+'/item/'+id); REV=r.rev;
    STORE[coll]=(STORE[coll]||[]).filter(x=>x.id!==id); render();
  }catch(e){ alert(e.message); }
}

// ---- 試算表(PDF)の取り込み：貼り付けたテキストから自動抽出 ----
function parseAmount(str){
  const m=String(str).match(/[△▲\-]?\s*[\d,]+/g);
  if(!m||!m.length) return null;
  let v=m[m.length-1];                 // 行の右端の数値を採用
  const neg=/[△▲\-]/.test(v);
  v=Number(v.replace(/[^\d]/g,''));
  if(isNaN(v)) return null;
  return neg?-v:v;
}
function parseTrialBalance(text){
  const lines=text.split(/\r?\n/);
  let revenue=null,cogs=null,sga=null; const sgaItems=[]; let inSga=false;
  lines.forEach(line=>{
    const l=line.replace(/\s/g,'');
    if(!l) return;
    if(revenue===null && /(売上高|純売上高|売上高合計|売上$)/.test(l)){ const n=parseAmount(line); if(n!==null){revenue=Math.abs(n);} return; }
    if(cogs===null && /(売上原価|当期商品仕入高|製造原価|原価合計)/.test(l)){ const n=parseAmount(line); if(n!==null){cogs=Math.abs(n);} return; }
    if(/(販売費及び一般管理費|販売費及一般管理費|販売費・一般管理費|販管費合計|販売管理費|販売費及び一般管理費合計)/.test(l)){ const n=parseAmount(line); if(n!==null) sga=Math.abs(n); inSga=true; return; }
    if(inSga){
      if(/(営業利益|営業損益|営業損失|経常利益|販管費合計|合計)/.test(l)){ const n=parseAmount(line); if(sga===null&&n!==null) sga=Math.abs(n); inSga=false; return; }
      const n=parseAmount(line);
      const label=line.replace(/[△▲\-]?\s*[\d,]+/g,'').replace(/[¥￥]/g,'').trim();
      if(n!==null && label && label.length<=24) sgaItems.push({name:label,amount:Math.abs(n)});
    }
  });
  if(sga===null && sgaItems.length) sga=sum(sgaItems,it=>it.amount);
  return {revenue,cogs,sga,sgaItems};
}

async function handleTBFile(file){
  if(!file) return;
  const st=document.getElementById('tb_pdfstatus');
  if(!window.pdfjsLib){ st.innerHTML='<span class="down">PDF読み取りライブラリを読み込めませんでした。ネット接続を確認するか、テキスト貼り付けをご利用ください。</span>'; return; }
  if(!pdfjsLib.GlobalWorkerOptions.workerSrc) pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
  st.textContent='PDFを読み取り中…';
  try{
    const buf=await file.arrayBuffer();
    const pdf=await pdfjsLib.getDocument({data:buf}).promise;
    let text='';
    for(let p=1;p<=pdf.numPages;p++){
      const page=await pdf.getPage(p);
      const content=await page.getTextContent();
      const lines={};
      content.items.forEach(it=>{ if(!it.str) return; const y=Math.round(it.transform[5]); (lines[y]=lines[y]||[]).push({x:it.transform[4],s:it.str}); });
      Object.keys(lines).map(Number).sort((a,b)=>b-a).forEach(y=>{ text+=lines[y].sort((a,b)=>a.x-b.x).map(o=>o.s).join(' ')+'\n'; });
      text+='\n';
    }
    const ta=document.getElementById('tb_text'); if(ta) ta.value=text;
    if(!text.replace(/\s/g,'')){ st.innerHTML='<span class="down">文字を抽出できませんでした（スキャン画像のPDFの可能性）。テキスト貼り付けをお試しください。</span>'; return; }
    st.innerHTML=`<span class="up">「${file.name}」を読み取りました（${pdf.numPages}ページ）。下の内容を確認してください。</span>`;
    runTBParse();
  }catch(e){ st.innerHTML='<span class="down">PDFの読み取りに失敗しました（'+e.message+'）。テキスト貼り付けをお試しください。</span>'; }
}
function runTBParse(){
  const r=parseTrialBalance(fv('tb_text')); window._tbParsed=r;
  document.getElementById('tb_result').innerHTML=`
    <div class="alert ${(r.revenue||r.cogs||r.sga)?'ok':'warn'}">${(r.revenue||r.cogs||r.sga)?'読み取りました。金額を確認・修正して「保存」を押してください。':'うまく読み取れませんでした。下の欄に手入力でも保存できます。'}</div>

}

// 求職者を数値評価する5項目
const SCORE_AXES=[
  {key:'skill',         label:'スキル',            color:'#4f8cff'},
  {key:'experience',    label:'経験',              color:'#06b6d4'},
  {key:'motivation',    label:'意欲',              color:'#22c55e'},
  {key:'culture',       label:'カルチャー適性',    color:'#f59e0b'},
  {key:'communication', label:'コミュニケーション',color:'#a78bfa'},
];
let recFilter={q:'',source:'all',stage:'all',sort:'score'};

function recHasScore(r){ return r.scores && SCORE_AXES.some(a=>Number(r.scores[a.key])>0); }
function recAvg(r){ if(!recHasScore(r)) return null; return SCORE_AXES.reduce((s,a)=>s+Number((r.scores||{})[a.key]||0),0)/SCORE_AXES.length; }
function recTotal(r){ return SCORE_AXES.reduce((s,a)=>s+Number((r.scores||{})[a.key]||0),0); }
function scoreColor(avg){ return avg>=4?'#4ade80':avg>=3?'#fbbf24':'#f87171'; }
// 生年月日(YYYY-MM-DD)から満年齢を計算
function ageFromBirth(iso){ if(!iso) return null; const d=new Date(iso); if(isNaN(d)) return null;
  const t=new Date(); let a=t.getFullYear()-d.getFullYear(); const m=t.getMonth()-d.getMonth();
  if(m<0||(m===0&&t.getDate()<d.getDate())) a--; return (a>=0&&a<130)?a:null; }
function ageLabel(iso){ const a=ageFromBirth(iso); return a!=null?a+'歳':'—'; }
function recAgeUpdate(){ const el=document.getElementById('r_age'); if(el) el.value=ageLabel(fv('r_birth')); }
function stagePillCls(st){ return st==='入社'?'ok':st==='内定'?'info':st==='見送り'?'bad':st==='面接'?'warn':'muted'; }

// レーダーチャート（5軸・ダークテーマ）
function radarSVG(scores,size=210,max=5){
  const cx=size/2, cy=size/2, r=size/2-38, n=SCORE_AXES.length;
  const ang=i=>Math.PI*2*i/n - Math.PI/2;
  const pt=(i,v)=>[cx+r*(v/max)*Math.cos(ang(i)), cy+r*(v/max)*Math.sin(ang(i))];
  let g='';
  [1,2,3,4,5].forEach(lv=>{ g+=`<polygon points="${SCORE_AXES.map((a,i)=>pt(i,lv).join(',')).join(' ')}" fill="none" stroke="#2a2f3a" stroke-width="1"/>`; });
  SCORE_AXES.forEach((a,i)=>{ const[x,y]=pt(i,max); g+=`<line x1="${cx}" y1="${cy}" x2="${x}" y2="${y}" stroke="#2a2f3a"/>`; });
  const dp=SCORE_AXES.map((a,i)=>pt(i,Number(scores[a.key]||0)));
  g+=`<polygon points="${dp.map(p=>p.join(',')).join(' ')}" fill="rgba(79,140,255,.22)" stroke="#4f8cff" stroke-width="2" stroke-linejoin="round"/>`;
  dp.forEach(p=>{ g+=`<circle cx="${p[0]}" cy="${p[1]}" r="3.2" fill="#4f8cff"/>`; });
  SCORE_AXES.forEach((a,i)=>{ const lr=r+20; const x=cx+lr*Math.cos(ang(i)), y=cy+lr*Math.sin(ang(i));
    const anchor=Math.abs(x-cx)<10?'middle':(x>cx?'start':'end'); const lbl=a.label.length>6?a.label.slice(0,5)+'…':a.label;
    g+=`<text x="${x}" y="${y}" font-size="10" fill="#9aa3b2" text-anchor="${anchor}" dominant-baseline="middle">${lbl}</text>`; });
  return `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}" style="overflow:visible">${g}</svg>`;
}

function recFilteredList(){
  let list=(STORE.recruits||[]).filter(r=>{
    if(recFilter.stage!=='all' && r.stage!==recFilter.stage) return false;
    if(recFilter.source!=='all' && (r.source||'')!==recFilter.source) return false;
    if(recFilter.q){ const s=((r.name||'')+(r.kana||'')+(r.position||'')+(r.source||'')).toLowerCase(); if(!s.includes(recFilter.q.toLowerCase())) return false; }
    return true;
  });
  if(recFilter.sort==='score') list.sort((a,b)=>recTotal(b)-recTotal(a));
  else if(recFilter.sort==='date') list.sort((a,b)=>(b.applied||'').localeCompare(a.applied||''));
  else if(recFilter.sort==='name') list.sort((a,b)=>((a.kana||a.name||'')).localeCompare(b.kana||b.name||'','ja'));
  else if(recFilter.sort==='stage') list.sort((a,b)=>RECRUIT_STAGES.indexOf(a.stage)-RECRUIT_STAGES.indexOf(b.stage));
  return list;
}

      <input id="r_applied" type="date" value="${x.applied||todayISO()}"><input id="r_aw" value="${escapeHtml(x.airworkId||'')}" placeholder="AW-00000"></div>

function recPreview(){

function recruitIntegration(){
  const ed=canEdit('recruits');
  const awCount=(STORE.recruits||[]).filter(r=>r.source==='Airワーク').length;
  openModal('Airワーク連携 / CSV',`
    <div class="alert info" style="margin-bottom:14px">
      <b>連携方式について：</b> Airワーク採用管理には一般公開されたAPIが無いため、現時点の連携は
      <b>CSVの取り込み／書き出し</b>で行います。将来 公式API等が使える場合に備え、下に「API連携」枠を用意しています（未実装）。
    </div>
    <div class="stat-line"><span class="muted">現在Airワーク経由の候補者</span><b>${awCount}名</b></div>
    <div style="margin:16px 0 8px;font-weight:600">CSV連携（利用可能）</div>
    <p class="muted" style="font-size:12px;margin:0 0 12px;line-height:1.7">Airワークからダウンロードした応募者CSVを取り込みます。氏名・フリガナ・ポジション・流入経路・面談日・各評価項目の列を自動でマッピングします。</p>
    <div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:6px">
      ${ed?`<button class="btn ghost" onclick="document.getElementById('rec-csv-file').click()">⬆ CSVを取り込む</button>`:''}
      <button class="btn ghost" onclick="recExportCsv()">⬇ CSVを書き出す</button>
      <input id="rec-csv-file" type="file" accept=".csv" style="display:none" onchange="recImportCsv(this)">
    </div>
    <div style="margin:20px 0 8px;font-weight:600">API連携 <span class="pill muted">準備中</span></div>
    <div class="field"><label>APIエンドポイント</label><input disabled placeholder="https://api.airwork...（未設定）" style="opacity:.6"></div>
    <div class="field"><label>APIキー / トークン</label><input disabled placeholder="接続情報が利用可能になり次第設定" style="opacity:.6"></div>`, null);
  const sv=document.getElementById('modal-save'); sv.style.display='none';
}
function recExportCsv(){
  const rs=STORE.recruits||[];
  const header=['氏名','フリガナ','ポジション','流入経路','AirワークID','面談日','選考状況',...SCORE_AXES.map(a=>a.label),'合計','メモ'];
  const rows=rs.map(r=>[r.name,r.kana,r.position,r.source,r.airworkId,r.applied,r.stage,...SCORE_AXES.map(a=>(r.scores||{})[a.key]??''),recTotal(r),(r.note||'').replace(/\n/g,' ')]);
  const csv=[header,...rows].map(row=>row.map(v=>`"${String(v??'').replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob=new Blob(['﻿'+csv],{type:'text/csv;charset=utf-8'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=`候補者データ_${todayISO()}.csv`; a.click();
}
function recImportCsv(input){
  const file=input.files[0]; if(!file) return;
  const reader=new FileReader();
  reader.onload=async e=>{
    try{
      const text=String(e.target.result).replace(/^﻿/,'');
      const lines=text.split(/\r?\n/).filter(l=>l.trim());
      const parse=line=>{ const out=[]; let cur='',q=false; for(let i=0;i<line.length;i++){ const ch=line[i];
        if(q){ if(ch==='"'){ if(line[i+1]==='"'){cur+='"';i++;} else q=false; } else cur+=ch; }
        else { if(ch===','){out.push(cur);cur='';} else if(ch==='"'){q=true;} else cur+=ch; } } out.push(cur); return out; };
      const head=parse(lines[0]); const idx=n=>head.findIndex(h=>h.includes(n));
      const imported=lines.slice(1).map(line=>{ const cols=parse(line); const g=(n,d='')=>{ const i=idx(n); return i>=0?cols[i]:d; };
        const scores=SCORE_AXES.reduce((o,a)=>{ const i=idx(a.label); o[a.key]=i>=0?(Number(cols[i])||0):0; return o; },{});
        const stg=g('選考状況')||g('ステータス'); const stage=RECRUIT_STAGES.includes(stg)?stg:'応募';
        return {id:b(),name:g('氏名'),kana:g('フリガナ'),position:g('ポジション')||g('職種')||'',source:g('流入経路')||'Airワーク',
          airworkId:g('AirワークID')||g('ID'),applied:g('面談日')||g('応募日')||todayISO(),stage,note:g('メモ'),scores};
      }).filter(r=>r.name);
      if(!imported.length){ alert('取り込めるデータがありませんでした'); input.value=''; return; }
      STORE.recruits=[...imported,...(STORE.recruits||[])];
      await persist('recruits'); closeModal(); render();
      alert(`${imported.length}件を取り込みました`);
    }catch(err){ alert('CSVの読み込みに失敗しました: '+err.message); }
    input.value='';
  };
  reader.readAsText(file,'UTF-8');
}

let memoQ='';
function memoClients(){
  return [...new Set([...(STORE.contracts||[]).map(x=>x.client), ...(STORE.memos||[]).map(m=>m.client)].filter(Boolean))];
}
function renderMemos(c,p){
  const ed=canEdit('memos');
  setHeader(p.title,p.sub, ed?`<button class="btn" onclick="editMemo()">＋ メモを追加</button>`:roBadge());

    </div>

function memoRenderBody(){
  const el=document.getElementById('memo-body'); if(!el) return;
  const ed=canEdit('memos');
  const memos=(STORE.memos||[]).slice().sort((a,b)=>(b.date||'').localeCompare(a.date||''));
  const q=memoQ.trim().toLowerCase();
  const hit=q?memos.filter(m=>((m.client||'')+' '+(m.title||'')+' '+(m.body||'')+' '+(m.content||'')+' '+(m.background||'')+' '+(m.nextAction||'')+' '+(m.via||'')+' '+(m.attendees||'')).toLowerCase().includes(q)):memos;
  // クライアント情報（契約＋メモ件数）— 検索時に表示
  const clientHits=q?memoClients().filter(cl=>cl.toLowerCase().includes(q)):[];
  const clientCard=clientHits.length?`<div class="card" style="margin-bottom:16px"><h3>🏢 クライアント情報 <span class="pill info">${clientHits.length}件ヒット</span></h3>
    ${clientHits.map(cl=>{
      const cs=(STORE.contracts||[]).filter(x=>x.client===cl);
      const ms=memos.filter(m=>m.client===cl);
      const total=sum(cs,x=>x.amount);
      return `<div style="margin-bottom:12px;padding:12px;background:var(--bg);border:1px solid var(--line);border-radius:10px">
        <div style="display:flex;justify-content:space-between;align-items:center"><b>${escapeHtml(cl)}</b>
          <span class="muted" style="font-size:12px">契約 ${cs.length}件${total?`・計 ${yen(total)}`:''} ／ メモ ${ms.length}件</span></div>
        ${cs.map(x=>`<div class="stat-line"><span>📄 ${escapeHtml(x.type||'契約')} <span class="pill ${x.status==='有効'?'ok':'warn'}" style="margin-left:6px">${x.status||''}</span>
          <span class="muted" style="font-size:11px">　${fmtDate(x.start)}〜${fmtDate(x.end)}</span></span><b>${yen(x.amount)}</b></div>`).join('')}
      </div>`;}).join('')}</div>`:'';
  el.innerHTML=`${clientCard}
    <div class="card"><h3>メモ一覧 <span class="pill muted">${hit.length}件</span></h3>
    <div style="overflow-x:auto"><table>
      <thead><tr><th>日付</th><th>クライアント</th><th>タイトル</th><th>経由</th><th>次回アクション</th><th>議事録</th>${ed?'<th></th>':''}</tr></thead>
      <tbody>${hit.map(m=>`<tr style="cursor:pointer" onclick="showMemo('${m.id}')">
        <td>${m.date||'—'}</td><td><b>${escapeHtml(m.client||'—')}</b></td><td>${escapeHtml(m.title||'')}</td>
        <td><span class="muted" style="font-size:12px">${escapeHtml(m.via||'—')}</span></td>
        <td class="muted" style="font-size:12px;max-width:220px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${escapeHtml(m.nextAction||'')}</td>
        <td onclick="event.stopPropagation()">${m.minutesUrl?`<a href="${escapeHtml(m.minutesUrl)}" target="_blank" rel="noopener" title="議事録を開く" style="color:var(--accent);text-decoration:none">📋 開く</a>`:'<span class="muted">—</span>'}</td>
        ${ed?`<td class="row-actions" onclick="event.stopPropagation()"><button class="icon-btn" onclick="editMemo('${m.id}')">✏️</button><button class="icon-btn" onclick="del('memos','${m.id}')">🗑</button></td>`:''}
      </tr>`).join('')||`<tr><td colspan="${ed?7:6}"><div class="empty">${q?'検索に一致するメモがありません':'メモがありません。「＋ メモを追加」から記録してください。'}</div></td></tr>`}</tbody>
    </table></div></div>`;
}
function showMemo(id){

  const ed=canEdit('memos');
  const kv=(k,v)=>`<div class="stat-line"><span class="muted">${k}</span><b>${v}</b></div>`;
  const sec=(label,text)=>text?`<div style="margin-top:12px"><div class="muted" style="font-size:12px;margin-bottom:4px">${label}</div>

  const content=m.content!==undefined?m.content:(m.body||'');  // 旧データ互換

function editMemo(id){

      return upsert('memos',{id:id||b(),date:fv('mm_date'),client:fv('mm_client').trim(),title:fv('mm_title').trim(),

// ---- アカウントの追加・編集（管理者） ----
function editUser(u){
  const isNew=!u; u=u||{username:'',display_name:'',role:'viewer',pages:[],biz:'全社'};
  const pageChecks=PAGES.map(p=>`<label><input type="checkbox" class="u_page" value="${p.id}"${(u.pages||[]).includes(p.id)?' checked':''}> ${p.icon} ${p.name}</label>`).join('');
  const bizOpts=['全社',...(STORE.businesses||[]).map(z=>z.name)];
  openModal(isNew?'メンバーを追加':'メンバーを編集',`
    ${field('ユーザーID（ログインに使用）','u_user',u.username)}
    ${isNew?'':'<p class="muted" style="font-size:11px;margin:-8px 0 12px">※ ユーザーIDは変更できません</p>'}
    ${field('表示名','u_name',u.display_name)}
    ${selField('権限','u_role',roleLabel(u.role),['閲覧者','編集者','管理者'])}
    ${selField('所属事業（売上を自事業のみに制限する場合に選択）','u_biz',u.biz||'全社',bizOpts)}
    ${field(isNew?'初期パスワード（6文字以上）':'パスワード（変更する場合のみ入力）','u_pw','','password')}
    <div class="field"><label>表示できるページ（権限が「管理者」の場合は全ページ）</label><div class="checks">${pageChecks}</div></div>`,
    async()=>{
      const roleMap={'閲覧者':'viewer','編集者':'editor','管理者':'admin'};
      const role=roleMap[fv('u_role')];
      const pages=[...document.querySelectorAll('.u_page:checked')].map(e=>e.value);
      const biz=fv('u_biz');
      const pw=fv('u_pw');
      if(isNew){
        await api('POST','/api/users',{username:fv('u_user'),display_name:fv('u_name'),role,pages,biz,password:pw});
      }else{
        const body={display_name:fv('u_name'),role,pages,biz}; if(pw) body.password=pw;
        const idEl=u.id; await api('PUT','/api/users/'+idEl,body);
      }
      closeModal(); render();
    });
  if(!isNew){ const inp=document.getElementById('u_user'); inp.disabled=true; inp.style.opacity=.6; }
}
async function delUser(id,name){
  if(!confirm(`メンバー「${name}」を削除しますか?`)) return;
  try{ await api('DELETE','/api/users/'+id); render(); }catch(e){ alert(e.message); }
}
