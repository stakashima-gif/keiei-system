<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>経営管理システム</title>
<style>
  :root{
    --bg:#0f1115; --panel:#171a21; --panel2:#1e222b; --line:#2a2f3a;
    --txt:#e7eaf0; --muted:#9aa3b2; --accent:#4f8cff; --accent2:#22c55e;
    --warn:#f59e0b; --danger:#ef4444; --info:#06b6d4; --purple:#a78bfa;
    --radius:12px; --shadow:0 4px 24px rgba(0,0,0,.35);
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic UI","Meiryo",sans-serif;background:var(--bg);color:var(--txt);font-size:14px;line-height:1.5}
  .app{display:flex;min-height:100vh}
  .sidebar{width:230px;background:var(--panel);border-right:1px solid var(--line);padding:18px 12px;position:sticky;top:0;height:100vh;overflow-y:auto;flex-shrink:0;display:flex;flex-direction:column}
  .brand{display:flex;align-items:center;gap:10px;padding:6px 8px 16px}
  .brand .logo{width:34px;height:34px;border-radius:9px;background:linear-gradient(135deg,var(--accent),var(--purple));display:grid;place-items:center;font-weight:800;color:#fff}
  .brand h1{font-size:15px;margin:0;font-weight:700}
  .brand small{color:var(--muted);font-size:11px}
  .nav{display:flex;flex-direction:column;gap:2px;margin-top:6px}
  .nav button{display:flex;align-items:center;gap:10px;width:100%;text-align:left;background:transparent;border:none;color:var(--muted);padding:10px 12px;border-radius:9px;cursor:pointer;font-size:13.5px;font-family:inherit}
  .nav button:hover{background:var(--panel2);color:var(--txt)}
  .nav button.active{background:linear-gradient(90deg,rgba(79,140,255,.18),transparent);color:var(--txt);font-weight:600}
  .nav .ic{width:18px;text-align:center;opacity:.85}
  .nav .sect{font-size:10.5px;color:#5c6675;text-transform:uppercase;letter-spacing:.08em;padding:14px 12px 4px;font-weight:700}
  .userbox{margin-top:auto;border-top:1px solid var(--line);padding-top:12px}
  .userbox .uname{font-size:13px;font-weight:600;padding:0 8px}
  .userbox .urole{font-size:11px;color:var(--muted);padding:2px 8px 8px}
  .main{flex:1;min-width:0;display:flex;flex-direction:column}
  .topbar{display:flex;align-items:center;justify-content:space-between;padding:16px 26px;border-bottom:1px solid var(--line);background:rgba(15,17,21,.6);position:sticky;top:0;z-index:20;backdrop-filter:blur(8px)}
  .topbar h2{margin:0;font-size:18px;white-space:nowrap}
  .topbar .sub{color:var(--muted);font-size:12px;margin-top:2px}
  .actions{display:flex;gap:8px;align-items:center}
  .content{padding:24px 26px;max-width:1400px;width:100%}
  .btn{background:var(--accent);color:#fff;border:none;padding:8px 14px;border-radius:9px;cursor:pointer;font-size:13px;font-weight:600;font-family:inherit;display:inline-flex;align-items:center;gap:6px}
  .btn:hover{filter:brightness(1.08)}
  .btn.ghost{background:var(--panel2);color:var(--txt);border:1px solid var(--line)}
  .btn.sm{padding:5px 10px;font-size:12px}
  .btn.danger{background:var(--danger)}
  .btn.block{width:100%;justify-content:center;padding:11px}
  .grid{display:grid;gap:16px}
  .kpis{grid-template-columns:repeat(auto-fit,minmax(190px,1fr))}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:18px}
  .kpi .label{color:var(--muted);font-size:12px;display:flex;align-items:center;gap:6px}
  .kpi .val{font-size:26px;font-weight:800;margin-top:8px;letter-spacing:-.02em}
  .kpi .delta{font-size:12px;margin-top:6px}
  .up{color:var(--accent2)} .down{color:var(--danger)}
  .card h3{margin:0 0 14px;font-size:14px;display:flex;align-items:center;justify-content:space-between}
  .pill{font-size:11px;padding:3px 9px;border-radius:20px;font-weight:600;display:inline-block}
  .pill.ok{background:rgba(34,197,94,.15);color:#4ade80}
  .pill.warn{background:rgba(245,158,11,.15);color:#fbbf24}
  .pill.bad{background:rgba(239,68,68,.15);color:#f87171}
  .pill.info{background:rgba(6,182,212,.15);color:#22d3ee}
  .pill.muted{background:var(--panel2);color:var(--muted)}
  table{width:100%;border-collapse:collapse;font-size:13px}
  th,td{text-align:left;padding:10px 12px;border-bottom:1px solid var(--line)}
  th{color:var(--muted);font-weight:600;font-size:11.5px;text-transform:uppercase;letter-spacing:.04em}
  tbody tr:hover{background:var(--panel2)}
  td.num,th.num{text-align:right;font-variant-numeric:tabular-nums}
  .row-actions{display:flex;gap:6px;justify-content:flex-end}
  .icon-btn{background:transparent;border:none;color:var(--muted);cursor:pointer;font-size:14px;padding:2px 6px;border-radius:6px}
  .icon-btn:hover{background:var(--panel2);color:var(--txt)}
  .modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.55);display:none;place-items:center;z-index:100;padding:20px}
  .modal-bg.show{display:grid}
  .modal{background:var(--panel);border:1px solid var(--line);border-radius:14px;max-width:540px;width:100%;box-shadow:var(--shadow);max-height:90vh;overflow-y:auto}
  .modal header{padding:18px 22px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center}
  .modal header h3{margin:0;font-size:16px}
  .modal .body{padding:22px}
  .modal footer{padding:16px 22px;border-top:1px solid var(--line);display:flex;justify-content:flex-end;gap:10px}
  .field{margin-bottom:14px}
  .field label{display:block;font-size:12px;color:var(--muted);margin-bottom:6px}
  .field input,.field select,.field textarea{width:100%;background:var(--bg);border:1px solid var(--line);color:var(--txt);padding:9px 11px;border-radius:8px;font-size:13px;font-family:inherit}
  .field input:focus,.field select:focus{outline:none;border-color:var(--accent)}
  .field.two{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .field.two label{grid-column:1/-1}
  .checks{display:grid;grid-template-columns:1fr 1fr;gap:8px}
  .checks label{display:flex;align-items:center;gap:8px;background:var(--bg);border:1px solid var(--line);padding:8px 10px;border-radius:8px;font-size:12.5px;color:var(--txt);cursor:pointer}
  .checks input{width:auto}
  .bars{display:flex;align-items:flex-end;gap:8px;height:180px;padding-top:10px}
  .bars .bar{flex:1;display:flex;flex-direction:column;justify-content:flex-end;align-items:center;gap:6px;height:100%}
  .bars .bar .b{width:70%;border-radius:6px 6px 0 0;background:linear-gradient(180deg,var(--accent),rgba(79,140,255,.4));min-height:2px}
  .bars .bar .b.b2{background:linear-gradient(180deg,var(--accent2),rgba(34,197,94,.4))}
  .bars .bar small{color:var(--muted);font-size:10.5px}
  .legend{display:flex;gap:16px;font-size:11.5px;color:var(--muted);margin-top:10px}
  .legend i{display:inline-block;width:10px;height:10px;border-radius:3px;margin-right:5px;vertical-align:middle}
  .progress{height:8px;background:var(--panel2);border-radius:20px;overflow:hidden}
  .progress > i{display:block;height:100%;border-radius:20px;background:var(--accent)}
  .two-col{display:grid;grid-template-columns:1.4fr 1fr;gap:16px}
  .three-col{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
  .donut{display:grid;place-items:center}
  .alert{padding:12px 14px;border-radius:9px;font-size:13px;margin-bottom:10px;border:1px solid}
  .alert.warn{background:rgba(245,158,11,.08);border-color:rgba(245,158,11,.3);color:#fbbf24}
  .alert.bad{background:rgba(239,68,68,.08);border-color:rgba(239,68,68,.3);color:#f87171}
  .alert.ok{background:rgba(34,197,94,.08);border-color:rgba(34,197,94,.3);color:#4ade80}
  .alert.info{background:rgba(6,182,212,.08);border-color:rgba(6,182,212,.3);color:#22d3ee}
  .stat-line{display:flex;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--line);font-size:13px}
  .stat-line:last-child{border-bottom:none}
  .stat-line b{font-variant-numeric:tabular-nums}
  .muted{color:var(--muted)}
  .empty{text-align:center;color:var(--muted);padding:40px}
  .toolbar{display:flex;gap:10px;align-items:center;margin-bottom:16px;flex-wrap:wrap}
  .toolbar select{background:var(--panel);border:1px solid var(--line);color:var(--txt);padding:7px 11px;border-radius:8px;font-size:13px;font-family:inherit}
  /* ログイン画面 */
  .login-wrap{min-height:100vh;display:grid;place-items:center;padding:20px}
  .login-card{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:34px;width:100%;max-width:380px;box-shadow:var(--shadow)}
  .login-card .logo{width:48px;height:48px;border-radius:12px;background:linear-gradient(135deg,var(--accent),var(--purple));display:grid;place-items:center;font-weight:800;color:#fff;font-size:20px;margin:0 auto 16px}
  .login-card h1{text-align:center;font-size:19px;margin:0 0 4px}
  .login-card p{text-align:center;color:var(--muted);font-size:12px;margin:0 0 22px}
  .login-err{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);color:#f87171;padding:10px;border-radius:8px;font-size:12.5px;margin-bottom:14px;text-align:center}
  @media(max-width:760px){
    .app{flex-direction:column}
    .sidebar{width:100%;height:auto;position:static;border-right:none;border-bottom:1px solid var(--line);padding:12px}
    .nav{flex-direction:row;flex-wrap:wrap;gap:4px}
    .nav .sect{display:none}
    .nav button{width:auto;padding:7px 10px;font-size:12.5px}
    .userbox{margin-top:12px}
    .topbar{flex-direction:column;align-items:flex-start;gap:10px;padding:14px 16px}
    .topbar h2{white-space:normal;font-size:16px}
    .actions{flex-wrap:wrap}
    .content{padding:16px}
    .two-col,.three-col{grid-template-columns:1fr}
    .checks{grid-template-columns:1fr}
    table{font-size:12px}th,td{padding:8px 8px}
  }
</style>
</head>
<body>
<div id="root"></div>

<div class="modal-bg" id="modal-bg">
  <div class="modal">
    <header><h3 id="modal-title">編集</h3><button class="icon-btn" onclick="closeModal()">✕</button></header>
    <div class="body" id="modal-body"></div>
    <footer>
      <button class="btn ghost" onclick="closeModal()">キャンセル</button>
      <button class="btn" id="modal-save">保存</button>
    </footer>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script>
//==================================================================
// API クライアント
//==================================================================
async function api(method, path, body){
  const opt={method, headers:{}, credentials:'same-origin'};
  if(body!==undefined){ opt.headers['Content-Type']='application/json'; opt.body=JSON.stringify(body); }
  const res=await fetch(path, opt);
  let data=null; try{ data=await res.json(); }catch(e){}
  if(!res.ok){ const e=new Error((data&&data.error)||('エラー '+res.status)); e.status=res.status; throw e; }
  return data;
}

//==================================================================
// 共通フォーマッタ・定義
//==================================================================
const yen = n => '¥' + Math.round(n||0).toLocaleString('ja-JP');
const pct = n => (n>=0?'+':'') + (n||0).toFixed(1) + '%';
const todayISO = () => new Date().toISOString().slice(0,10);
const months = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
const sum = (arr,f)=>(arr||[]).reduce((a,x)=>a+(f?f(x):x),0);
function b(){ return 'id'+Math.random().toString(36).slice(2,9); }
function addDays(n){ const d=new Date(); d.setDate(d.getDate()+n); return d.toISOString().slice(0,10); }
function fmtDate(iso){ if(!iso) return '—'; const d=new Date(iso); return `${d.getMonth()+1}/${d.getDate()}`; }
function daysTo(iso){ return Math.ceil((new Date(iso)-new Date(todayISO()))/86400000); }

const PAGES = [
  {id:'dashboard', icon:'📊', name:'ダッシュボード', title:'経営ダッシュボード', sub:'全社の経営状況をひと目で把握', sect:'分析'},
  {id:'analysis', icon:'📈', name:'経営状況分析', title:'経営状況分析', sub:'指標・トレンド・健全性の診断', sect:'分析'},
  {id:'breakeven', icon:'⚖️', name:'損益分岐分析', title:'損益分岐点分析', sub:'固定費・変動費から採算ラインを算出', sect:'分析'},
  {id:'business', icon:'🏢', name:'事業管理', title:'事業管理', sub:'事業セグメント別の進捗と採算', sect:'事業・収益'},
  {id:'sales', icon:'💹', name:'売上管理', title:'売上管理', sub:'月次・事業別の売上推移', sect:'事業・収益'},
  {id:'finance', icon:'💰', name:'財務管理', title:'財務管理', sub:'損益計算書（PL）と資金状況', sect:'事業・収益'},
  {id:'tasks', icon:'✅', name:'タスク管理', title:'タスク管理', sub:'全社のタスク進捗と期限管理', sect:'業務'},
  {id:'contracts', icon:'📄', name:'契約管理', title:'契約管理', sub:'契約状況と更新期限のアラート', sect:'業務'},
  {id:'people', icon:'👥', name:'人材管理', title:'人材状況', sub:'人員構成・人件費・評価', sect:'業務'},
  {id:'recruits', icon:'🧑‍💼', name:'採用管理', title:'採用管理', sub:'候補者・募集ポジション・選考状況の管理', sect:'業務'},
  {id:'tools', icon:'🔗', name:'ツール', title:'ツール一元管理', sub:'よく使うツールへのリンク集', sect:'ツール'},
];
const PAGE_WRITE={business:['businesses'],sales:['sales'],finance:['finance'],breakeven:['cost'],tasks:['tasks'],contracts:['contracts'],people:['people'],tools:['tools'],recruits:['recruits'],dashboard:[],analysis:[]};
const PAGE_NAME=Object.fromEntries(PAGES.map(p=>[p.id,p.name]));

//==================================================================
// 状態
//==================================================================
let ME=null, STORE={}, REV=0, current=null, pollTimer=null;
function canEdit(pageId){
  if(!ME) return false;
  if(ME.role==='admin') return true;
  if(ME.role!=='editor') return false;
  return (ME.pages||[]).includes(pageId) && (PAGE_WRITE[pageId]||[]).length>0;
}
function allowedPages(){ return ME.role==='admin'?PAGES.map(p=>p.id):(ME.pages||[]); }

//==================================================================
// 起動・認証フロー
//==================================================================
async function boot(){
  try{ const r=await api('GET','/api/me'); ME=r.user; await afterLogin(); }
  catch(e){ renderLogin(); }
}
async function afterLogin(){
  await loadStore();
  const pages=allowedPages();
  current = pages.includes('dashboard')?'dashboard':(pages[0]|| (ME.role==='admin'?'users':null));
  renderShell(); render();
  startPolling();
}
async function loadStore(){ const r=await api('GET','/api/store'); STORE=r.store; REV=r.rev; }

function renderLogin(msg){
  stopPolling();
  document.getElementById('root').innerHTML=`
    <div class="login-wrap"><div class="login-card">
      <div class="logo">経</div>
      <h1>経営管理システム</h1><p>ログインしてください</p>
      <div id="login-err" class="login-err" style="display:${msg?'block':'none'}">${msg||''}</div>
      <div class="field"><label>ユーザーID</label><input id="li_user" autocomplete="username"></div>
      <div class="field"><label>パスワード</label><input id="li_pw" type="password" autocomplete="current-password"></div>
      <button class="btn block" id="li_btn">ログイン</button>
    </div></div>`;
  const submit=async()=>{
    try{ const r=await api('POST','/api/login',{username:document.getElementById('li_user').value,password:document.getElementById('li_pw').value});
      ME=r.user; await afterLogin();
    }catch(e){ const el=document.getElementById('login-err'); el.style.display='block'; el.textContent=e.message; }
  };
  document.getElementById('li_btn').onclick=submit;
  document.getElementById('li_pw').addEventListener('keydown',e=>{if(e.key==='Enter')submit();});
  document.getElementById('li_user').focus();
}
async function logout(){ try{await api('POST','/api/logout');}catch(e){} ME=null; STORE={}; renderLogin(); }

//==================================================================
// アプリのシェル（サイドバー）
//==================================================================
function renderShell(){
  const pages=allowedPages();
  const sects={}; PAGES.forEach(p=>{ if(pages.includes(p.id)){ (sects[p.sect]=sects[p.sect]||[]).push(p); }});
  let navHtml='';
  Object.entries(sects).forEach(([s,ps])=>{
    navHtml+=`<div class="sect">${s}</div>`;
    ps.forEach(p=>navHtml+=`<button data-pg="${p.id}"><span class="ic">${p.icon}</span> ${p.name}</button>`);
  });
  if(ME.role==='admin'){
    navHtml+=`<div class="sect">管理</div><button data-pg="users"><span class="ic">🔑</span> アカウント管理</button>`;
  }
  document.getElementById('root').innerHTML=`
    <div class="app">
      <aside class="sidebar">
        <div class="brand"><div class="logo">経</div><div><h1>経営管理システム</h1><small>Management Suite</small></div></div>
        <nav class="nav" id="nav">${navHtml}</nav>
        <div class="userbox">
          <div class="uname">${ME.display_name}</div>
          <div class="urole">${roleLabel(ME.role)}</div>
          <button class="btn ghost sm" style="width:100%;justify-content:center;margin-bottom:6px" onclick="changePassword()">🔒 パスワード変更</button>
          <button class="btn ghost sm" style="width:100%;justify-content:center" onclick="logout()">↩ ログアウト</button>
        </div>
      </aside>
      <main class="main">
        <div class="topbar"><div><h2 id="page-title"></h2><div class="sub" id="page-sub"></div></div><div class="actions" id="page-actions"></div></div>
        <div class="content" id="content"></div>
      </main>
    </div>`;
  document.querySelectorAll('#nav button').forEach(btn=>btn.onclick=()=>go(btn.dataset.pg));
}
function roleLabel(r){ return r==='admin'?'管理者（全権限）':r==='editor'?'編集者':'閲覧者'; }
function go(id){ current=id; markNav(); render(); window.scrollTo(0,0); }
function markNav(){ document.querySelectorAll('#nav button').forEach(b=>b.classList.toggle('active', b.dataset.pg===current)); }
function setHeader(title,sub,actions){
  document.getElementById('page-title').textContent=title;
  document.getElementById('page-sub').textContent=sub||'';
  document.getElementById('page-actions').innerHTML=actions||'';
}

//==================================================================
// リアルタイム反映（ポーリング）
//==================================================================
function startPolling(){
  stopPolling();
  pollTimer=setInterval(async()=>{
    if(!ME) return;
    if(document.getElementById('modal-bg').classList.contains('show')) return; // 編集中は更新しない
    try{ const r=await api('GET','/api/rev');
      if(r.rev!==REV){ await loadStore(); if(current!=='users') render(); }
    }catch(e){ if(e.status===401){ ME=null; renderLogin('セッションが切れました。再度ログインしてください。'); } }
  }, 4000);
}
function stopPolling(){ if(pollTimer){ clearInterval(pollTimer); pollTimer=null; } }

//==================================================================
// データ書き込み（API経由）
//==================================================================
async function persist(coll){
  const r=await api('PUT','/api/store/'+coll,{value:STORE[coll]});
  REV=r.rev;
}

//==================================================================
// チャート
//==================================================================
function barChart(data, opts={}){
  const max=Math.max(...data.map(d=>d.v),1); const cls=opts.green?'b b2':'b';
  return `<div class="bars">${data.map(d=>`<div class="bar" title="${d.label}: ${opts.fmt?opts.fmt(d.v):d.v}"><div class="${cls}" style="height:${Math.max(d.v/max*100,1)}%"></div><small>${d.label}</small></div>`).join('')}</div>`;
}
function stackedSales(){
  const s=STORE.sales||[]; const max=Math.max(...s.map(x=>x.total),1);
  return `<div class="bars">${s.map((x,i)=>`<div class="bar" title="${months[i]} 計 ${yen(x.total)}">
    <div style="width:70%;height:${x.total/max*100}%;display:flex;flex-direction:column;justify-content:flex-end;border-radius:6px 6px 0 0;overflow:hidden">
      <div style="background:#a78bfa;height:${x.consul/x.total*100}%"></div>
      <div style="background:#22c55e;height:${x.juchu/x.total*100}%"></div>
      <div style="background:#4f8cff;height:${x.saas/x.total*100}%"></div></div>
    <small>${i+1}月</small></div>`).join('')}</div>
    <div class="legend"><span><i style="background:#4f8cff"></i>SaaS</span><span><i style="background:#22c55e"></i>受託</span><span><i style="background:#a78bfa"></i>コンサル</span></div>`;
}
function donut(segments, size=140){
  const total=sum(segments,s=>s.value)||1; let acc=0; const r=size/2-12, c=size/2, circ=2*Math.PI*r;
  const arcs=segments.map(s=>{const frac=s.value/total; const dash=frac*circ; const off=-acc*circ; acc+=frac;
    return `<circle cx="${c}" cy="${c}" r="${r}" fill="none" stroke="${s.color}" stroke-width="18" stroke-dasharray="${dash} ${circ-dash}" stroke-dashoffset="${off}" transform="rotate(-90 ${c} ${c})"/>`;}).join('');
  return `<div class="donut"><svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">${arcs}
    <text x="${c}" y="${c-2}" text-anchor="middle" fill="#e7eaf0" font-size="13" font-weight="700">${total>=1e6?(total/1e6).toFixed(0)+'M':total}</text>
    <text x="${c}" y="${c+16}" text-anchor="middle" fill="#9aa3b2" font-size="10">合計</text></svg></div>`;
}
function legendList(segments){
  const total=sum(segments,s=>s.value)||1;
  return `<div style="margin-top:8px">${segments.map(s=>`<div class="stat-line"><span><i style="display:inline-block;width:10px;height:10px;border-radius:3px;background:${s.color};margin-right:8px"></i>${s.label}</span><b>${yen(s.value)} <span class="muted" style="font-weight:400">(${(s.value/total*100).toFixed(0)}%)</span></b></div>`).join('')}</div>`;
}
function kpi(label,icon,val,delta){ return `<div class="card kpi"><div class="label">${icon} ${label}</div><div class="val">${val}</div><div class="delta">${delta||''}</div></div>`; }
function prioDot(p){ const c=p==='高'?'#ef4444':p==='中'?'#f59e0b':'#22c55e'; return `<span style="color:${c}">●</span>`; }
function legendStat(k,v){ return `<div class="stat-line"><span class="muted">${k}</span><b>${v}</b></div>`; }

//==================================================================
// 集計
//==================================================================
function ytd(){ const f=STORE.finance||[]; const rev=sum(f,x=>x.revenue),op=sum(f,x=>x.op),cogs=sum(f,x=>x.cogs),sga=sum(f,x=>x.sga);
  return {rev,op,cogs,sga,opRate:rev?op/rev*100:0,gpRate:rev?(rev-cogs)/rev*100:0}; }
function laborTotal(){ return sum(STORE.people,p=>p.cost)*12; }
function breakeven(){ const {fixedMonthly,variableRate}=STORE.cost||{fixedMonthly:0,variableRate:0}; const cmRate=1-variableRate;
  const beRevenue=cmRate>0?fixedMonthly/cmRate:0; return {fixedMonthly,variableRate,cmRate,beRevenue,beAnnual:beRevenue*12}; }

let modalSave=null;
function openModal(title, html, onSave){
  document.getElementById('modal-title').textContent=title;
  document.getElementById('modal-body').innerHTML=html;
  modalSave=onSave;
  document.getElementById('modal-bg').classList.add('show');
}
function closeModal(){ document.getElementById('modal-bg').classList.remove('show'); modalSave=null; }
document.getElementById('modal-save').onclick=async()=>{ if(modalSave){ try{ await modalSave(); }catch(e){ alert(e.message); } } };
document.getElementById('modal-bg').onclick=e=>{ if(e.target.id==='modal-bg') closeModal(); };
function fv(id){ return document.getElementById(id).value; }
function fnum(id){ return Number(document.getElementById(id).value)||0; }
function field(label,id,val,type='text'){ return `<div class="field"><label>${label}</label><input id="${id}" type="${type}" value="${val??''}"></div>`; }
function selField(label,id,val,opts){ return `<div class="field"><label>${label}</label><select id="${id}">${opts.map(o=>`<option${o===val?' selected':''}>${o}</option>`).join('')}</select></div>`; }

async function upsert(coll,obj,id){
  if(id){ const i=STORE[coll].findIndex(x=>x.id===id); STORE[coll][i]=obj; }
  else { STORE[coll]=STORE[coll]||[]; STORE[coll].push(obj); }
  await persist(coll); closeModal(); render();
}
async function del(coll,id){
  if(!confirm('削除しますか?')) return;
  const backup=STORE[coll]; STORE[coll]=STORE[coll].filter(x=>x.id!==id);
  try{ await persist(coll); render(); }catch(e){ STORE[coll]=backup; alert(e.message); }
}

// ---- 試算表(PDF)の取り込み：貼り付けたテキストから自動抽出 ----
function parseAmount(str){
  const m=String(str).match(/[△▲\-]?\s*[\d,]+/g);
  if(!m||!m.length) return null;
  let v=m[m.length-1];                 // 行の右端の数値を採用
  const neg=/[△▲\-]/.test(v);
  v=Number(v.replace(/[^\d]/g,''));
  if(isNaN(v)) return null;
  return neg?-v:v;
}
function parseTrialBalance(text){
  const lines=text.split(/\r?\n/);
  let revenue=null,cogs=null,sga=null; const sgaItems=[]; let inSga=false;
  lines.forEach(line=>{
    const l=line.replace(/\s/g,'');
    if(!l) return;
    if(revenue===null && /(売上高|純売上高|売上高合計|売上$)/.test(l)){ const n=parseAmount(line); if(n!==null){revenue=Math.abs(n);} return; }
    if(cogs===null && /(売上原価|当期商品仕入高|製造原価|原価合計)/.test(l)){ const n=parseAmount(line); if(n!==null){cogs=Math.abs(n);} return; }
    if(/(販売費及び一般管理費|販売費及一般管理費|販売費・一般管理費|販管費合計|販売管理費|販売費及び一般管理費合計)/.test(l)){ const n=parseAmount(line); if(n!==null) sga=Math.abs(n); inSga=true; return; }
    if(inSga){
      if(/(営業利益|営業損益|営業損失|経常利益|販管費合計|合計)/.test(l)){ const n=parseAmount(line); if(sga===null&&n!==null) sga=Math.abs(n); inSga=false; return; }
      const n=parseAmount(line);
      const label=line.replace(/[△▲\-]?\s*[\d,]+/g,'').replace(/[¥￥]/g,'').trim();
      if(n!==null && label && label.length<=24) sgaItems.push({name:label,amount:Math.abs(n)});
    }
  });
  if(sga===null && sgaItems.length) sga=sum(sgaItems,it=>it.amount);
  return {revenue,cogs,sga,sgaItems};
}
function importTrialBalance(){
  const monthOpts=months.map((m,i)=>`<option value="${i}">${m}</option>`).join('');
  openModal('試算表の取り込み（PDF）',`
    <div class="alert info" style="margin-top:0">税理士から届いた<b>PDFファイルをそのまま選択</b>すると、中の文字を自動で読み取り、売上高・売上原価・販管費（と内訳）を抽出します。読み取り後に金額を確認・修正してから保存してください。</div>
    <div class="field"><label>対象月</label><select id="tb_month">${monthOpts}</select></div>
    <div class="field"><label>① PDFファイルを選択</label><input id="tb_file" type="file" accept="application/pdf,.pdf" onchange="handleTBFile(this.files&&this.files[0])"></div>
    <div id="tb_pdfstatus" class="muted" style="font-size:12px;margin:-6px 0 12px"></div>
    <details style="margin-bottom:12px"><summary class="muted" style="font-size:12px;cursor:pointer">うまく読めない場合：テキストを貼り付けて読み取る</summary>
      <div class="field" style="margin-top:10px"><textarea id="tb_text" rows="6" placeholder="PDFの文字をコピーして貼り付け…"></textarea></div>
      <button class="btn ghost sm" onclick="runTBParse()">🔍 貼り付けたテキストを読み取る</button>
    </details>
    <div id="tb_result" style="margin-top:6px"></div>`,
    async()=>{
      if(!window._tbParsed){ alert('先に「読み取る」を押して内容を確認してください'); throw new Error('未読み取り'); }
      const i=Number(fv('tb_month'));
      const rev=fnum('tb_rev'), co=fnum('tb_cogs'), sg=fnum('tb_sga');
      const f=STORE.finance||[];
      const items=(window._tbParsed.sgaItems||[]);
      f[i]={month:i,revenue:rev,cogs:co,sga:sg,op:rev-co-sg, sgaItems:items};
      STORE.finance=f; await persist('finance'); window._tbParsed=null; closeModal(); render();
    });
}
async function handleTBFile(file){
  if(!file) return;
  const st=document.getElementById('tb_pdfstatus');
  if(!window.pdfjsLib){ st.innerHTML='<span class="down">PDF読み取りライブラリを読み込めませんでした。ネット接続を確認するか、テキスト貼り付けをご利用ください。</span>'; return; }
  if(!pdfjsLib.GlobalWorkerOptions.workerSrc) pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
  st.textContent='PDFを読み取り中…';
  try{
    const buf=await file.arrayBuffer();
    const pdf=await pdfjsLib.getDocument({data:buf}).promise;
    let text='';
    for(let p=1;p<=pdf.numPages;p++){
      const page=await pdf.getPage(p);
      const content=await page.getTextContent();
      const lines={};
      content.items.forEach(it=>{ if(!it.str) return; const y=Math.round(it.transform[5]); (lines[y]=lines[y]||[]).push({x:it.transform[4],s:it.str}); });
      Object.keys(lines).map(Number).sort((a,b)=>b-a).forEach(y=>{ text+=lines[y].sort((a,b)=>a.x-b.x).map(o=>o.s).join(' ')+'\n'; });
      text+='\n';
    }
    const ta=document.getElementById('tb_text'); if(ta) ta.value=text;
    if(!text.replace(/\s/g,'')){ st.innerHTML='<span class="down">文字を抽出できませんでした（スキャン画像のPDFの可能性）。テキスト貼り付けをお試しください。</span>'; return; }
    st.innerHTML=`<span class="up">「${file.name}」を読み取りました（${pdf.numPages}ページ）。下の内容を確認してください。</span>`;
    runTBParse();
  }catch(e){ st.innerHTML='<span class="down">PDFの読み取りに失敗しました（'+e.message+'）。テキスト貼り付けをお試しください。</span>'; }
}
function runTBParse(){
  const r=parseTrialBalance(fv('tb_text')); window._tbParsed=r;
  document.getElementById('tb_result').innerHTML=`
    <div class="alert ${(r.revenue||r.cogs||r.sga)?'ok':'warn'}">${(r.revenue||r.cogs||r.sga)?'読み取りました。金額を確認・修正して「保存」を押してください。':'うまく読み取れませんでした。下の欄に手入力でも保存できます。'}</div>
    <div class="field two"><label>売上高 / 売上原価</label><input id="tb_rev" type="number" value="${r.revenue||0}"><input id="tb_cogs" type="number" value="${r.cogs||0}"></div>
    <div class="field"><label>販管費 合計</label><input id="tb_sga" type="number" value="${r.sga||0}"></div>
    ${r.sgaItems&&r.sgaItems.length?`<div class="field"><label>販管費の内訳（${r.sgaItems.length}件を検出）</label>
      <div style="max-height:140px;overflow:auto;border:1px solid var(--line);border-radius:8px;padding:8px">
      ${r.sgaItems.map(it=>`<div class="stat-line"><span>${it.name}</span><b>${yen(it.amount)}</b></div>`).join('')}</div></div>`:''}`;
}

// ---- ツール一元管理 ----
function renderTools(c,p){
  const ed=canEdit('tools');
  setHeader(p.title,p.sub, ed?`<button class="btn" onclick="editTool()">＋ ツールを追加</button>`:roBadge());
  const tools=STORE.tools||[];
  const cats={}; tools.forEach(t=>{(cats[t.category||'その他']=cats[t.category||'その他']||[]).push(t);});
  if(!tools.length){ c.innerHTML='<div class="card"><div class="empty">ツールが登録されていません</div></div>'; return; }
  c.innerHTML=Object.entries(cats).map(([cat,list])=>`
    <div class="card" style="margin-bottom:16px"><h3>${cat}</h3>
    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px">
      ${list.map(t=>`<div style="position:relative;background:var(--bg);border:1px solid var(--line);border-radius:10px;padding:14px;display:flex;align-items:center;gap:10px">
        <a href="${t.url}" target="_blank" rel="noopener" style="display:flex;align-items:center;gap:10px;text-decoration:none;color:var(--txt);flex:1;min-width:0">
          <span style="font-size:22px">${t.icon||'🔗'}</span>
          <span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap"><b>${t.name}</b><br><span class="muted" style="font-size:11px">開く ↗</span></span>
        </a>
        ${ed?`<button class="icon-btn" onclick="editTool('${t.id}')">✏️</button><button class="icon-btn" onclick="del('tools','${t.id}')">🗑</button>`:''}
      </div>`).join('')}
    </div></div>`).join('');
}
function editTool(id){
  const x=(STORE.tools||[]).find(z=>z.id===id)||{name:'',url:'https://',category:'その他',icon:'🔗'};
  openModal(id?'ツールを編集':'ツールを追加',`${field('ツール名','t_name',x.name)}${field('URL','t_url',x.url)}${field('カテゴリ','t_cat',x.category)}${field('アイコン（絵文字1つ）','t_icon',x.icon)}`,
    ()=>upsert('tools',{id:id||b(),name:fv('t_name'),url:fv('t_url'),category:fv('t_cat')||'その他',icon:fv('t_icon')||'🔗'},id));
}

// ---- 採用管理 ----
const RECRUIT_STAGES=['応募','書類選考','面接','内定','入社','見送り'];
function renderRecruits(c,p){
  const ed=canEdit('recruits');
  setHeader(p.title,p.sub, ed?`<button class="btn" onclick="editRecruit()">＋ 候補者を追加</button>`:roBadge());
  const rs=STORE.recruits||[];
  const cnt=s=>rs.filter(r=>r.stage===s).length;
  const active=rs.filter(r=>!['入社','見送り'].includes(r.stage)).length;
  c.innerHTML=`
    <div class="grid kpis">
      ${kpi('候補者数','🧑‍💼',rs.length,'')}${kpi('選考中','🔄',active,'')}
      ${kpi('内定','🎉',cnt('内定'),'')}${kpi('入社','✅',cnt('入社'),'')}
    </div><div style="height:16px"></div>
    <div class="card"><h3>選考ファネル</h3>
      ${['応募','書類選考','面接','内定','入社'].map(st=>{const n=cnt(st);const max=rs.length||1;return `
        <div style="margin-bottom:10px"><div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:4px"><span>${st}</span><b>${n}名</b></div>
        <div class="progress"><i style="width:${n/max*100}%"></i></div></div>`;}).join('')}
    </div><div style="height:16px"></div>
    <div class="card"><table>
    <thead><tr><th>候補者</th><th>募集ポジション</th><th>選考状況</th><th>流入経路</th><th>応募日</th><th>メモ</th>${ed?'<th></th>':''}</tr></thead>
    <tbody>${rs.slice().sort((a,b)=>RECRUIT_STAGES.indexOf(a.stage)-RECRUIT_STAGES.indexOf(b.stage)).map(r=>`<tr>
      <td><b>${r.name}</b></td><td>${r.position}</td>
      <td><span class="pill ${r.stage==='入社'?'ok':r.stage==='内定'?'info':r.stage==='見送り'?'bad':'muted'}">${r.stage}</span></td>
      <td><span class="muted">${r.source||'—'}</span></td><td>${fmtDate(r.applied)}</td><td class="muted" style="font-size:12px">${r.note||''}</td>
      ${ed?`<td class="row-actions"><button class="icon-btn" onclick="editRecruit('${r.id}')">✏️</button><button class="icon-btn" onclick="del('recruits','${r.id}')">🗑</button></td>`:''}
    </tr>`).join('')||`<tr><td colspan="${ed?7:6}"><div class="empty">候補者がいません</div></td></tr>`}</tbody></table></div>`;
}
function editRecruit(id){
  const x=(STORE.recruits||[]).find(z=>z.id===id)||{name:'',position:'',stage:'応募',source:'求人媒体',applied:todayISO(),note:''};
  openModal(id?'候補者を編集':'候補者を追加',`${field('候補者名','r_name',x.name)}${field('募集ポジション','r_pos',x.position)}
    ${selField('選考状況','r_stage',x.stage,RECRUIT_STAGES)}
    ${selField('流入経路','r_src',x.source,['リファラル','求人媒体','エージェント','直接応募','SNS','その他'])}
    ${field('応募日','r_applied',x.applied,'date')}${field('メモ','r_note',x.note)}`,
    ()=>upsert('recruits',{id:id||b(),name:fv('r_name'),position:fv('r_pos'),stage:fv('r_stage'),source:fv('r_src'),applied:fv('r_applied'),note:fv('r_note')},id));
}

function changePassword(){
  openModal('パスワード変更',`${field('現在のパスワード','p_old','','password')}${field('新しいパスワード（6文字以上）','p_new','','password')}`,
    async()=>{ await api('POST','/api/password',{old:fv('p_old'),new:fv('p_new')}); closeModal(); alert('パスワードを変更しました'); });
}

// ---- アカウントの追加・編集（管理者） ----
function editUser(u){
  const isNew=!u; u=u||{username:'',display_name:'',role:'viewer',pages:[],biz:'全社'};
  const pageChecks=PAGES.map(p=>`<label><input type="checkbox" class="u_page" value="${p.id}"${(u.pages||[]).includes(p.id)?' checked':''}> ${p.icon} ${p.name}</label>`).join('');
  const bizOpts=['全社',...(STORE.businesses||[]).map(z=>z.name)];
  openModal(isNew?'メンバーを追加':'メンバーを編集',`
    ${field('ユーザーID（ログインに使用）','u_user',u.username)}
    ${isNew?'':'<p class="muted" style="font-size:11px;margin:-8px 0 12px">※ ユーザーIDは変更できません</p>'}
    ${field('表示名','u_name',u.display_name)}
    ${selField('権限','u_role',roleLabel(u.role),['閲覧者','編集者','管理者'])}
    ${selField('所属事業（売上を自事業のみに制限する場合に選択）','u_biz',u.biz||'全社',bizOpts)}
    ${field(isNew?'初期パスワード（6文字以上）':'パスワード（変更する場合のみ入力）','u_pw','','password')}
    <div class="field"><label>表示できるページ（権限が「管理者」の場合は全ページ）</label><div class="checks">${pageChecks}</div></div>`,
    async()=>{
      const roleMap={'閲覧者':'viewer','編集者':'editor','管理者':'admin'};
      const role=roleMap[fv('u_role')];
      const pages=[...document.querySelectorAll('.u_page:checked')].map(e=>e.value);
      const biz=fv('u_biz');
      const pw=fv('u_pw');
      if(isNew){
        await api('POST','/api/users',{username:fv('u_user'),display_name:fv('u_name'),role,pages,biz,password:pw});
      }else{
        const body={display_name:fv('u_name'),role,pages,biz}; if(pw) body.password=pw;
        const idEl=u.id; await api('PUT','/api/users/'+idEl,body);
      }
      closeModal(); render();
    });
  if(!isNew){ const inp=document.getElementById('u_user'); inp.disabled=true; inp.style.opacity=.6; }
}
async function delUser(id,name){
  if(!confirm(`メンバー「${name}」を削除しますか?`)) return;
  try{ await api('DELETE','/api/users/'+id); render(); }catch(e){ alert(e.message); }
}
